<script>
// === TEMA (claro/escuro) ===
function temaPreferidoSistema() {
  return (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
}

function aplicarTema(tema) {
  document.documentElement.setAttribute('data-theme', tema);
  var icone = document.getElementById('iconeTema');
  if (icone) icone.textContent = tema === 'dark' ? 'light_mode' : 'dark_mode';
}

function inicializarTema() {
  var salvo = null;
  try { salvo = localStorage.getItem('painelThalesTema'); } catch (e) {}
  aplicarTema(salvo || temaPreferidoSistema());
}

function alternarTema() {
  var atual = document.documentElement.getAttribute('data-theme') || 'light';
  var novo = atual === 'dark' ? 'light' : 'dark';
  aplicarTema(novo);
  try { localStorage.setItem('painelThalesTema', novo); } catch (e) {}
}

// === SAUDACAO conforme horario local de acesso ===
function atualizarSaudacao() {
  var el = document.getElementById('saudacaoUsuario');
  if (!el) return;
  var hora = new Date().getHours();
  var saudacao = 'Boa noite';
  if (hora >= 5 && hora < 12) saudacao = 'Bom dia';
  else if (hora >= 12 && hora < 18) saudacao = 'Boa tarde';
  var strong = el.querySelector('strong');
  var nome = strong ? strong.outerHTML : '';
  el.innerHTML = saudacao + ', ' + nome;
}

// === ABAS (NAVEGACAO) ===
// Mapeia data-vista -> id da secao correspondente no DOM.
var SECOES_POR_VISTA = {
  geral: 'secaoGeral',
  diligencias: 'secaoDiligencias',
  distribuicao: 'secaoDistribuicao',
  iniciais: 'secaoIniciais',
  acompanhamentos: 'secaoAcompanhamentos',
  atendimento_online: 'secaoAtendimentoOnline',
  panorama: 'secaoPanorama',
  graficos: 'secaoGraficos',
  audiencias: 'secaoAudiencias',
  utilitarios: 'secaoUtilitarios'
};

function inicializarTabs() {
  document.querySelectorAll('.nav-tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      trocarVista(this.dataset.vista);
    });
  });
}

function trocarVista(vista) {
  if (!SECOES_POR_VISTA[vista]) return;
  APP.vistaAtual = vista;

  if (vista === 'geral') carregarAbaGeral();
  if (vista === 'distribuicao') carregarAbaDistribuicao();
  if (vista === 'iniciais') carregarAbaIniciais();
  if (vista === 'acompanhamentos') carregarAbaAcompanhamentos();
  if (vista === 'atendimento_online') carregarAbaAtendimentoOnline();
  if (vista === 'panorama') carregarAbaPanorama();
  if (vista === 'graficos') carregarAbaGraficos();
  if (vista === 'audiencias') carregarAbaAudiencias();

  document.querySelectorAll('.nav-tab').forEach(function(t) {
    t.classList.toggle('ativo', t.dataset.vista === vista);
  });

  Object.keys(SECOES_POR_VISTA).forEach(function(v) {
    var el = document.getElementById(SECOES_POR_VISTA[v]);
    if (el) el.style.display = (v === vista) ? 'block' : 'none';
  });

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

document.addEventListener('DOMContentLoaded', function() {

function inicializarFiltros() {
  var inputBusca = document.getElementById('inputBusca');
  var inputDe    = document.getElementById('inputDfDe');
  var inputAte   = document.getElementById('inputDfAte');

  if (inputBusca) {
    inputBusca.addEventListener('input', function() {
      APP.busca = this.value.trim();
      APP.paginaAtual = 1;
      renderizarTabela();
    });
  }

  if (inputDe && inputAte) {
    function aplicarDatas() {
      APP.dfDe = inputDe.value;
      APP.dfAte = inputAte.value;
      APP.paginaAtual = 1;
      var btnLimpar = document.getElementById('btnLimparDatas');
      if (btnLimpar) btnLimpar.style.display = (APP.dfDe || APP.dfAte) ? 'flex' : 'none';
      renderizarTabela();
    }
    inputDe.addEventListener('change', aplicarDatas);
    inputAte.addEventListener('change', aplicarDatas);
  }
}

function alternarMenuGerenciar() {
  var menu = document.getElementById('menuGerenciar');
  var btn = document.getElementById('btnGerenciar');
  var abrindo = !menu.classList.contains('visivel');
  menu.classList.toggle('visivel', abrindo);
  btn.classList.toggle('aberto', abrindo);
}

function fecharMenuGerenciar() {
  document.getElementById('menuGerenciar').classList.remove('visivel');
  document.getElementById('btnGerenciar').classList.remove('aberto');
}

document.addEventListener('click', function(e) {
  var dropdown = document.getElementById('dropdownGerenciar');
  if (dropdown && !dropdown.contains(e.target)) fecharMenuGerenciar();
});

function acaoGerenciarEmBreve(nomeAcao) {
  fecharMenuGerenciar();
  mostrarToast(nomeAcao + ' — funcionalidade ainda em desenvolvimento.', '');

  document.getElementById('npProcesso').value = '';
  document.getElementById('npAssistido').value = '';
  document.getElementById('npPrazo').value = '';

  popularSelectSimples(document.getElementById('npEstagiario'), APP.dados.estagiarios, '', '— Selecione —');
  popularSelectSimples(document.getElementById('npEspecie'), APP.dados.picklists.especie, '', '— Selecione —');

  document.getElementById('modalNovoPedidoOverlay').classList.add('visivel');
}

function fecharModalNovoPedido() {
  document.getElementById('modalNovoPedidoOverlay').classList.remove('visivel');
}

document.getElementById('modalNovoPedidoOverlay').addEventListener('click', function(e) {
  if (e.target === this) fecharModalNovoPedido();
});

function salvarNovoPedido() {
  var payload = {
    processo: document.getElementById('npProcesso').value.trim(),
    assistido: document.getElementById('npAssistido').value.trim(),
    prazo: document.getElementById('npPrazo').value,
    estagiario: document.getElementById('npEstagiario').value,
    especie: document.getElementById('npEspecie').value
  };

  if (!payload.processo || !payload.assistido || !payload.prazo || !payload.estagiario || !payload.especie) {
    mostrarToast('Preencha todos os campos antes de salvar.', 'erro');
    return;
  }

  var btn = document.getElementById('btnSalvarNovoPedido');
  btn.disabled = true;
  btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px;">hourglass_top</span> Salvando...';

  google.script.run
    .withSuccessHandler(function(res) {
      btn.disabled = false;
      btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px;">save</span> Salvar';

      if (!res.sucesso) {
        mostrarToast(res.erro || 'Erro ao criar pedido.', 'erro');
        return;
      }

      mostrarToast('Pedido ' + res.id + ' criado com sucesso! Vencimento: ' + res.df, 'sucesso');
      fecharModalNovoPedido();
      recarregarAposEdicao();
    })
    .withFailureHandler(function(err) {
      btn.disabled = false;
      btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px;">save</span> Salvar';
      mostrarToast('Erro ao criar pedido: ' + err.message, 'erro');
    })
    .acaoCriarPedidoAluno(payload);
}

var APP_TRANSFERIR = { registro: null };

});

// Converte "dd/mm/aaaa" (formato usado no restante do painel) para
// "aaaa-mm-dd" (formato exigido por <input type="date">).
function _dataBrParaIso(dataBr) {
  var partes = String(dataBr || '').split('/');
  if (partes.length !== 3) return '';
  return partes[2] + '-' + partes[1] + '-' + partes[0];
}

function buscarDiligenciaTransferencia() {
  var id = document.getElementById('tfId').value.trim();
  if (!id) {
    mostrarToast('Informe o ID da diligência.', 'erro');
    return;
  }

  var btn = document.getElementById('btnBuscarTransferir');
  btn.disabled = true;

  google.script.run
    .withSuccessHandler(function(res) {
      btn.disabled = false;
      if (!res.sucesso) {
        mostrarToast(res.erro || 'Diligência não encontrada.', 'erro');
        return;
      }
      APP_TRANSFERIR.registro = res.registro;
      preencherModalTransferirDetalhe(res.registro);
      fecharModalTransferirBusca();
      document.getElementById('modalTransferirDetalheOverlay').classList.add('visivel');
    })
    .withFailureHandler(function(err) {
      btn.disabled = false;
      mostrarToast('Erro ao buscar diligência: ' + err.message, 'erro');
    })
    .acaoBuscarDiligenciaParaTransferencia(id);
}

function preencherModalTransferirDetalhe(reg) {
  document.getElementById('mtProcesso').textContent = 'ID ' + reg.id;
  document.getElementById('mtAssistido').textContent = reg.assistido || '—';
  document.getElementById('mtEspecie').textContent = reg.especie || '—';
  document.getElementById('mtStatus').textContent = reg.status || '—';
  document.getElementById('mtEstagiarioAtual').textContent = reg.estagiario || '— Não atribuído —';
  document.getElementById('tfDf').value = _dataBrParaIso(reg.df);

  var estagiariosDisponiveis = (APP.dados.estagiarios || []).filter(function(nome) {
    return normalizarChave(nome) !== normalizarChave(reg.estagiario);
  });
  popularSelectSimples(document.getElementById('tfNovoEstagiario'), estagiariosDisponiveis, '', '— Selecione —');
}

function fecharModalTransferirDetalhe() {
  document.getElementById('modalTransferirDetalheOverlay').classList.remove('visivel');
  APP_TRANSFERIR.registro = null;
}

document.getElementById('modalTransferirDetalheOverlay').addEventListener('click', function(e) {
  if (e.target === this) fecharModalTransferirDetalhe();
});

function confirmarTransferencia() {
  var reg = APP_TRANSFERIR.registro;
  if (!reg) return;

  var novoEstagiario = document.getElementById('tfNovoEstagiario').value;
  var novaDf = document.getElementById('tfDf').value;

  if (!novoEstagiario) {
    mostrarToast('Selecione o novo estagiário.', 'erro');
    return;
  }
  if (!novaDf) {
    mostrarToast('Informe a DF.', 'erro');
    return;
  }

  var confirmado = window.confirm(
    'Confirma a transferência da Diligência ID ' + reg.id + ' de ' +
    (reg.estagiario || '(sem estagiário)') + ' para ' + novoEstagiario + '?'
  );
  if (!confirmado) return;

  var btn = document.getElementById('btnConfirmarTransferir');
  btn.disabled = true;
  btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px;">hourglass_top</span> Transferindo...';

  google.script.run
    .withSuccessHandler(function(res) {
      btn.disabled = false;
      btn.innerHTML = 'Ok';

      if (!res.sucesso) {
        mostrarToast(res.erro || 'Erro ao transferir diligência.', 'erro');
        return;
      }

      var avisos = [res.classroomAviso, res.driveAviso, res.muralAviso].filter(Boolean);
      if (avisos.length === 0) {
        mostrarToast('Diligência ' + reg.id + ' transferida para ' + novoEstagiario + ' com sucesso!', 'sucesso');
      } else {
        mostrarToast('Diligência ' + reg.id + ' transferida, mas com avisos: ' + avisos.join(' '), 'erro');
      }

      fecharModalTransferirDetalhe();
      recarregarAposEdicao();
    })
    .withFailureHandler(function(err) {
      btn.disabled = false;
      btn.innerHTML = 'Ok';
      mostrarToast('Erro ao transferir diligência: ' + err.message, 'erro');
    })
    .acaoTransferirDiligencia({
      _linha: reg._linha,
      novoEstagiario: novoEstagiario,
      novaDf: novaDf
    });
}

function acaoGerenciarVerificarEntregas() {
  fecharMenuGerenciar();

  var btn = document.getElementById('btnGerenciar');
  var textoOriginal = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:18px;">hourglass_top</span> Verificando...';

  google.script.run
    .withSuccessHandler(function(res) {
      btn.disabled = false;
      btn.innerHTML = textoOriginal;

      if (!res.sucesso) {
        mostrarToast(res.erro || 'Erro ao verificar entregas.', 'erro');
        return;
      }

      var totalAtualizados = (res.atualizados || []).length;
      var totalErros = (res.erros || []).length;

      if (totalAtualizados === 0 && totalErros === 0) {
        mostrarToast('Nenhuma atualização de entrega encontrada.', '');
      } else if (totalErros === 0) {
        mostrarToast(totalAtualizados + ' registro(s) atualizado(s) com base nas entregas do Classroom.', 'sucesso');
      } else if (totalAtualizados === 0) {
        mostrarToast('Falha ao verificar ' + totalErros + ' registro(s). Veja o console.', 'erro');
        console.error('Erros ao verificar entregas:', res.erros);
      } else {
        mostrarToast(totalAtualizados + ' atualizado(s), ' + totalErros + ' com erro. Veja o console.', '');
        console.error('Erros ao verificar entregas:', res.erros);
      }

      recarregarAposEdicao();
      if (APP.vistaAtual === 'acompanhamentos') carregarAbaAcompanhamentos();
      if (APP.vistaAtual === 'iniciais') carregarAbaIniciais();
    })
    .withFailureHandler(function(err) {
      btn.disabled = false;
      btn.innerHTML = textoOriginal;
      mostrarToast('Erro ao verificar entregas: ' + err.message, 'erro');
    })
    .acaoVerificarEntregas();
}

// === CARGA DE DADOS ===
function carregarDados() {
  mostrarLoading(true);
  google.script.run
    .withSuccessHandler(function(resultado) {
      if (resultado.erro) {
        mostrarToast(resultado.erro, 'erro');
        mostrarLoading(false);
        return;
      }
      APP.dados = resultado;
      popularSelectSemestre();
      mostrarLoading(false);
      renderizarCards();
      renderizarTabela();
    })
    .withFailureHandler(function(err) {
      mostrarToast('Erro ao carregar dados: ' + err.message, 'erro');
      mostrarLoading(false);
    })
    .carregarDadosIniciais();
}

function recarregarAposEdicao() {
  google.script.run
    .withSuccessHandler(function(resultado) {
      if (resultado.erro) return;
      APP.dados.diligencias = resultado.diligencias;
      popularSelectSemestre();
      renderizarCards();
      renderizarTabela();
    })
    .withFailureHandler(function() {})
    .recarregarDiligencias();
}

// === LOGICA DE CLASSIFICACAO ===
var STATUS_FINAIS = ['ok', 'protocolado', 'cancelada'];

function normalizarChave(valor) {
  return String(valor || '')
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .trim()
    .toLowerCase();
}

function ehAtraso(reg) {
  return reg.atraso === true || reg.atraso === 'true';
}

// "Atraso exibivel": usado apenas para a decisao visual do BADGE da coluna
// STATUS na tabela — nao para contagem/filtro dos cards de resumo, que usam
// classificarRegistroChaves()/ehAtraso() com sua propria regra: um registro
// "Entregue" com atraso=true aparece tanto no card "Em Atraso" quanto no
// card "Entregues" (decisao de Thales, 14/07/2026).
//
// Regra do badge: o badge "Em Atraso" na tabela so deve aparecer quando o
// Status Real ainda for "Encaminhado" ou "Devolvida". Se o Status Real ja
// for "Entregue" (registro atrasado no prazo mas ja entregue no Classroom),
// o badge mostra o status real ("Entregue").
//
// A borda vermelha da linha (classe "linha-atraso"), porem, usa ehAtraso()
// diretamente — nao ehAtrasoExibivel() — em TODAS as tabelas (Diligencias,
// Iniciais, Acompanhamentos e as 3 sub-tabelas do Panorama). Ou seja, mesmo
// quando o badge mostra "Entregue", a linha continua com a borda esquerda
// vermelha se o registro estiver atrasado, sinalizando visualmente que a
// entrega ocorreu fora do prazo (decisao de Thales, 13/07/2026).
function ehAtrasoExibivel(reg) {
  if (!ehAtraso(reg)) return false;
  var chave = normalizarChave(reg.status);
  return chave === 'encaminhado' || chave === 'devolvida';
}

function ehSemEstagiario(reg) {
  var semEst = !String(reg.estagiario || '').trim();
  var chave = normalizarChave(reg.status);
  return semEst && STATUS_FINAIS.indexOf(chave) === -1;
}

// Registros Cancelados continuam aparecendo nas tabelas (com a badge normal),
// mas nao entram nas contagens dos cards do Panorama (decisao de Thales).
function naoEhCancelada(reg) {
  return normalizarChave(reg.status) !== 'cancelada';
}

// Retorna a chave de classificacao: atraso | encaminhado | entregue | devolvida | concluido | cancelada | outros
function classificarRegistro(reg) {
  if (ehAtraso(reg)) return 'atraso';
  var chave = normalizarChave(reg.status);
  if (chave === 'ok' || chave === 'protocolado') return 'concluido';
  if (chave === 'encaminhado') return 'encaminhado';
  if (chave === 'entregue') return 'entregue';
  if (chave === 'devolvida') return 'devolvida';
  if (chave === 'cancelada') return 'cancelada';
  return 'outros';
}

// Retorna todas as chaves de classificacao aplicaveis a um registro (usada na
// contagem/filtro dos cards de resumo). Normalmente e uma unica chave, igual a
// classificarRegistro(). Excecao: um registro com Status "Entregue" que foi
// entregue apos o prazo (atraso=true) deve aparecer tanto no card "Em Atraso"
// quanto no card "Entregues", entao retorna as duas chaves nesse caso.
function classificarRegistroChaves(reg) {
  var chave = normalizarChave(reg.status);
  if (ehAtraso(reg) && chave === 'entregue') return ['atraso', 'entregue'];
  return [classificarRegistro(reg)];
}

function normalizarStatusParaUI(status) {
  var chave = normalizarChave(status);
  if (!chave) return '';
  if (chave === 'ok') return 'Ok';
  if (chave === 'protocolado') return 'Protocolado';
  if (chave === 'encaminhado') return 'Encaminhado';
  if (chave === 'devolvida') return 'Devolvida';
  if (chave === 'entregue') return 'Entregue';
  if (chave === 'cancelada') return 'Cancelada';
  return String(status || '').trim();
}

function getRegistrosFiltrados() {
  var lista = APP.dados.diligencias || [];

  if (APP.filtroCard !== 'total') {
    lista = lista.filter(function(r) {
      if (APP.filtroCard === 'sem_estagiario') return ehSemEstagiario(r);
      return classificarRegistroChaves(r).indexOf(APP.filtroCard) !== -1;
    });
  }

  if (APP.busca) {
    var b = normalizar(APP.busca);
    lista = lista.filter(function(r) {
      return (
        normalizar(r.processo).includes(b) ||
        normalizar(r.assistido).includes(b) ||
        normalizar(r.diligencia).includes(b) ||
        normalizar(r.estagiario).includes(b) ||
        normalizar(r.vara).includes(b)
      );
    });
  }

  if (APP.dfDe || APP.dfAte) {
    var tsDe  = APP.dfDe  ? converterInputDataParaTimestamp(APP.dfDe)  : null;
    var tsAte = APP.dfAte ? converterInputDataParaTimestamp(APP.dfAte) : null;
    lista = lista.filter(function(r) {
      var ts = converterDataBRParaTimestamp(r.df);
      if (ts === null) return false;
      if (tsDe  !== null && ts < tsDe)  return false;
      if (tsAte !== null && ts > tsAte) return false;
      return true;
    });
  }

  if (APP.semestreFiltro) {
    lista = lista.filter(function(r) { return r.semestre === APP.semestreFiltro; });
  }

  lista = lista.slice().sort(function(a, b) {
    return compararRegistros(a, b, APP.ordenacao.coluna, APP.ordenacao.direcao);
  });

  return lista;
}

function converterInputDataParaTimestamp(isoStr) {
  if (!isoStr) return null;
  var p = isoStr.split('-');
  if (p.length !== 3) return null;
  var d = new Date(parseInt(p[0], 10), parseInt(p[1], 10) - 1, parseInt(p[2], 10));
  d.setHours(0, 0, 0, 0);
  return isNaN(d.getTime()) ? null : d.getTime();
}

function limparFiltroDatas() {
  APP.dfDe = '';
  APP.dfAte = '';
  APP.paginaAtual = 1;
  var inputDe  = document.getElementById('inputDfDe');
  var inputAte = document.getElementById('inputDfAte');
  if (inputDe)  inputDe.value  = '';
  if (inputAte) inputAte.value = '';
  var btnLimpar = document.getElementById('btnLimparDatas');
  if (btnLimpar) btnLimpar.style.display = 'none';
  renderizarTabela();
}

function normalizar(str) {
  return String(str || '')
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .toLowerCase();
}

function obterSemestreAtual() {
  try {
    var hoje = new Date();
    var ano = hoje.getFullYear();
    var mes = hoje.getMonth() + 1;
    if (!ano || !mes) return '';
    return ano + '.' + (mes <= 6 ? '01' : '02');
  } catch (e) {
    return '';
  }
}

function popularSelectSemestre() {
  var select = document.getElementById('selectSemestre');
  if (!select) return;

  var presentes = {};
  (APP.dados.diligencias || []).forEach(function(r) {
    if (r.semestre) presentes[r.semestre] = true;
  });

  var semestres = Object.keys(presentes).sort().reverse();
  var valorAtual = APP.semestreFiltro;

  select.innerHTML = '<option value="">— Todos os semestres —</option>';
  semestres.forEach(function(s) {
    var opt = document.createElement('option');
    opt.value = s;
    opt.textContent = s;
    if (s === valorAtual) opt.selected = true;
    select.appendChild(opt);
  });
}

function mudarSemestre(valor) {
  APP.semestreFiltro = valor || '';
  APP.paginaAtual = 1;
  renderizarCards();
  renderizarTabela();
}

function ordenarPor(coluna) {
  if (APP.ordenacao.coluna === coluna) {
    APP.ordenacao.direcao = (APP.ordenacao.direcao === 'asc') ? 'desc' : 'asc';
  } else {
    APP.ordenacao.coluna = coluna;
    APP.ordenacao.direcao = 'asc';
  }
  APP.paginaAtual = 1;
  renderizarTabela();
}

function compararRegistros(a, b, coluna, direcao) {
  var mult = (direcao === 'desc') ? -1 : 1;

  if (coluna === 'di' || coluna === 'df') {
    var tempoA = converterDataBRParaTimestamp(a[coluna]);
    var tempoB = converterDataBRParaTimestamp(b[coluna]);
    if (tempoA === null && tempoB === null) return 0;
    if (tempoA === null) return 1;
    if (tempoB === null) return -1;
    return (tempoA - tempoB) * mult;
  }

  var valorA = String(a[coluna] || '');
  var valorB = String(b[coluna] || '');
  return valorA.localeCompare(valorB, 'pt-BR', { numeric: true, sensitivity: 'base' }) * mult;
}

function thOrdenavel(label, coluna) {
  var ativo = APP.ordenacao.coluna === coluna;
  var seta = '';
  if (ativo) {
    var simbolo = (APP.ordenacao.direcao === 'asc') ? '▲' : '▼';
    seta = '<span class="th-seta">' + simbolo + '</span>';
  }
  return '<th class="th-ordenavel" onclick="ordenarPor(\'' + coluna + '\')">' + label + seta + '</th>';
}

function converterDataBRParaTimestamp(valor) {
  if (valor === null || valor === undefined || valor === '') return null;

  if (valor instanceof Date) {
    if (isNaN(valor.getTime())) return null;
    var dataObj = new Date(valor.getTime());
    dataObj.setHours(0, 0, 0, 0);
    return dataObj.getTime();
  }

  if (typeof valor === 'number') {
    var dataNum = new Date(valor);
    if (isNaN(dataNum.getTime())) return null;
    dataNum.setHours(0, 0, 0, 0);
    return dataNum.getTime();
  }

  var texto = String(valor || '').trim();
  if (!texto) return null;

  // Remove horario quando houver (ex.: "20/06/2026 14:12:14").
  texto = texto.split(' ')[0].trim();

  // dd/mm/aaaa, dd-mm-aaaa ou dd.mm.aaaa
  var mBr = texto.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{4})$/);
  if (mBr) {
    var dia = parseInt(mBr[1], 10);
    var mes = parseInt(mBr[2], 10) - 1;
    var ano = parseInt(mBr[3], 10);
    var dataBr = new Date(ano, mes, dia);
    if (isNaN(dataBr.getTime())) return null;
    // Valida rollover (31/02 nao pode virar 02/03).
    if (dataBr.getFullYear() !== ano || dataBr.getMonth() !== mes || dataBr.getDate() !== dia) return null;
    dataBr.setHours(0, 0, 0, 0);
    return dataBr.getTime();
  }

  // yyyy-mm-dd ou yyyy/mm/dd
  var mIso = texto.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})$/);
  if (mIso) {
    var anoIso = parseInt(mIso[1], 10);
    var mesIso = parseInt(mIso[2], 10) - 1;
    var diaIso = parseInt(mIso[3], 10);
    var dataIso = new Date(anoIso, mesIso, diaIso);
    if (isNaN(dataIso.getTime())) return null;
    if (dataIso.getFullYear() !== anoIso || dataIso.getMonth() !== mesIso || dataIso.getDate() !== diaIso) return null;
    dataIso.setHours(0, 0, 0, 0);
    return dataIso.getTime();
  }

  return null;
}

function contarPorClassificacao(lista) {
  var c = { total: 0, encaminhado: 0, entregue: 0, devolvida: 0, concluido: 0, cancelada: 0, atraso: 0, sem_estagiario: 0 };
  lista.forEach(function(r) {
    c.total++;
    if (ehSemEstagiario(r)) c.sem_estagiario++;
    classificarRegistroChaves(r).forEach(function(cl) {
      if (c[cl] !== undefined) c[cl]++;
    });
  });
  return c;
}

// === RENDERIZACAO: CARDS ===
function renderizarCards() {
  var lista = APP.dados.diligencias || [];
  if (APP.semestreFiltro) {
    lista = lista.filter(function(r) { return r.semestre === APP.semestreFiltro; });
  }
  var c = contarPorClassificacao(lista);

  var cards = [
    { id: 'total',          label: 'TOTAL',            num: c.total,          classe: 'card-total' },
    { id: 'encaminhado',    label: 'ENCAMINHADOS',    num: c.encaminhado,    classe: 'card-encaminhado' },
    { id: 'entregue',       label: 'ENTREGUES',        num: c.entregue,       classe: 'card-entregue' },
    { id: 'devolvida',      label: 'DEVOLVIDAS',      num: c.devolvida,      classe: 'card-devolvida' },
    { id: 'concluido',      label: 'OK / PROTOCOLADO', num: c.concluido,      classe: 'card-concluido' },
    { id: 'cancelada',      label: 'CANCELADAS',      num: c.cancelada,      classe: 'card-cancelada' },
    { id: 'atraso',         label: 'EM ATRASO',        num: c.atraso,         classe: 'card-atraso' },
    { id: 'sem_estagiario', label: 'SEM ESTAGIÁRIO',  num: c.sem_estagiario, classe: 'card-sem-estagiario' }
  ];

  var html = '';
  cards.forEach(function(card) {
    var ativo = APP.filtroCard === card.id ? ' ativo' : '';
    var icone = CARD_ICONES[card.id] || 'folder';
    html += '<div class="card-resumo ' + card.classe + ativo + '" onclick="filtrarCard(\'' + card.id + '\')">' +
      '<div class="card-icone"><span class="material-symbols-outlined">' + icone + '</span></div>' +
      '<div class="card-info">' +
        '<div class="card-numero">' + card.num + '</div>' +
        '<div class="card-label">' + card.label + '</div>' +
      '</div>' +
    '</div>';
  });

  document.getElementById('cardsGrid').innerHTML = html;
}

function filtrarCard(id) {
  APP.filtroCard = id;
  APP.paginaAtual = 1;
  renderizarCards();
  renderizarTabela();
}

function renderizarCelulaEstagiario(reg) {
  var est = String(reg.estagiario || '').trim();
  if (est) return est;
  if (ehSemEstagiario(reg)) {
    return '<span class="estagiario-celula-vazio"><span class="material-symbols-outlined sem-estagiario-indicador">person_off</span></span>';
  }
  return '<span class="celula-vazio">—</span>';
}

function badgeStatus(reg) {
  var badgeBase;
  if (ehAtrasoExibivel(reg)) {
    badgeBase = '<span class="badge badge-atraso">Em Atraso</span>';
  } else {
    var s = normalizarStatusParaUI(reg.status);
    if (!s) {
      badgeBase = '<span class="badge badge-vazio">—</span>';
    } else {
      var chave = normalizarChave(s);
      if (chave === 'ok' || chave === 'protocolado') badgeBase = '<span class="badge badge-concluido">' + s + '</span>';
      else if (chave === 'encaminhado') badgeBase = '<span class="badge badge-encaminhado">Encaminhado</span>';
      else if (chave === 'entregue') badgeBase = '<span class="badge badge-entregue">Entregue</span>';
      else if (chave === 'devolvida') badgeBase = '<span class="badge badge-devolvida">Devolvida</span>';
      else if (chave === 'cancelada') badgeBase = '<span class="badge badge-cancelada">Cancelada</span>';
      else badgeBase = '<span class="badge badge-vazio">' + s + '</span>';
    }
  }
  return badgeBase + badgeGatilho(reg);
}

// Indicador visual (somente cor/icone, sem e-mail) de proximidade de prazo.
// gatilho1 = 5 dias uteis antes da DF, gatilho2 = vespera, gatilho3 = dia da DF.
function badgeGatilho(reg) {
  if (!reg.gatilho) return '';
  var mapa = {
    gatilho1: { classe: 'gatilho-amarelo', titulo: 'Vence em 5 dias úteis' },
    gatilho2: { classe: 'gatilho-laranja', titulo: 'Vence amanhã (dia útil)' },
    gatilho3: { classe: 'gatilho-vermelho', titulo: 'Vence hoje' }
  };
  var info = mapa[reg.gatilho];
  if (!info) return '';
  return '<span class="badge-gatilho ' + info.classe + '" title="' + info.titulo + '">' +
    '<span class="material-symbols-outlined" style="font-size:13px;">schedule</span>' +
  '</span>';
}

function descricaoFiltro() {
  var mapa = {
    total: 'Todos os registros', encaminhado: 'Status: Encaminhado', entregue: 'Status: Entregue',
    devolvida: 'Status: Devolvida', concluido: 'Status: Ok / Protocolado', cancelada: 'Status: Cancelada',
    atraso: 'Em Atraso', sem_estagiario: 'Sem Estagiário'
  };
  return mapa[APP.filtroCard] || '';
}

// === RENDERIZACAO: TABELA ===
function renderizarTabela() {
  var lista = getRegistrosFiltrados();
  var total = lista.length;
  var totalPags = Math.max(1, Math.ceil(total / APP.itensPorPagina));
  if (APP.paginaAtual > totalPags) APP.paginaAtual = totalPags;

  var inicio = (APP.paginaAtual - 1) * APP.itensPorPagina;
  var fim = Math.min(inicio + APP.itensPorPagina, total);
  var pagina = lista.slice(inicio, fim);

  document.getElementById('tabelaInfo').innerHTML =
    '<strong>' + total + '</strong> registro(s) — ' + descricaoFiltro();

  document.getElementById('tabelaCabecalho').innerHTML =
    '<tr>' +
      thOrdenavel('ID', 'id') +
      thOrdenavel('PROCESSO', 'processo') +
      thOrdenavel('ASSISTIDO(A)', 'assistido') +
      thOrdenavel('DI', 'di') +
      thOrdenavel('PRAZO', 'prazo') +
      thOrdenavel('DF', 'df') +
      thOrdenavel('ESTAGIÁRIO(A)', 'estagiario') +
      thOrdenavel('STATUS', 'status') +
      thOrdenavel('ESPÉCIE', 'especie') +
      thOrdenavel('SUBESPÉCIE', 'subespecie') +
    '</tr>';

  if (pagina.length === 0) {
    document.getElementById('tabelaCorpo').innerHTML =
      '<tr><td colspan="10">' +
        '<div class="estado-vazio">' +
          '<span class="material-symbols-outlined">search_off</span>' +
          '<div class="estado-vazio-titulo">Nenhum registro encontrado</div>' +
          '<div class="estado-vazio-desc">Tente ajustar o filtro ou a busca.</div>' +
        '</div>' +
      '</td></tr>';
  } else {
    var html = '';
    pagina.forEach(function(reg, idx) {
      var classeAtraso = ehAtraso(reg) ? ' linha-atraso' : '';
      html += '<tr class="' + classeAtraso + '" onclick="abrirModal(this)" data-idx="' + (inicio + idx) + '">' +
        '<td class="td-numero">' + (reg.id || '') + '</td>' +
        '<td class="td-processo">' + (reg.processo || '') + '</td>' +
        '<td class="td-assistido">' + (reg.assistido || '') + '</td>' +
        '<td>' + (reg.di || '') + '</td>' +
        '<td>' + (reg.prazo || '') + '</td>' +
        '<td>' + (reg.df || '') + '</td>' +
        '<td>' + renderizarCelulaEstagiario(reg) + '</td>' +
        '<td>' + badgeStatus(reg) + '</td>' +
        '<td>' + (reg.especie || '<span class="celula-vazio">—</span>') + '</td>' +
        '<td>' + (reg.subespecie || '<span class="celula-vazio">—</span>') + '</td>' +
      '</tr>';
    });
    document.getElementById('tabelaCorpo').innerHTML = html;
  }

  renderizarPaginacao(total, totalPags);
}

// === PAGINACAO ===
function renderizarPaginacao(total, totalPags) {
  var p = APP.paginaAtual;
  var inicio = (p - 1) * APP.itensPorPagina + 1;
  var fim = Math.min(p * APP.itensPorPagina, total);

  var html = '';
  if (total > 0) html += '<span class="pag-info">' + inicio + '–' + fim + ' de ' + total + '</span>';

  html += '<button class="btn-pag" onclick="irPagina(' + (p - 1) + ')" ' + (p <= 1 ? 'disabled' : '') + '>' +
    '<span class="material-symbols-outlined">chevron_left</span> Ant.' +
  '</button>';

  var range = pagRange(p, totalPags);
  range.forEach(function(n) {
    if (n === '...') {
      html += '<span class="pag-info">…</span>';
    } else {
      html += '<button class="btn-pag' + (n === p ? ' pag-ativo' : '') + '" onclick="irPagina(' + n + ')">' + n + '</button>';
    }
  });

  html += '<button class="btn-pag" onclick="irPagina(' + (p + 1) + ')" ' + (p >= totalPags ? 'disabled' : '') + '>' +
    'Próx. <span class="material-symbols-outlined">chevron_right</span>' +
  '</button>';

  document.getElementById('paginacao').innerHTML = html;
}

function pagRange(atual, total) {
  if (total <= 7) {
    var r = [];
    for (var i = 1; i <= total; i++) r.push(i);
    return r;
  }
  var pages = [1];
  if (atual > 3) pages.push('...');
  for (var j = Math.max(2, atual - 1); j <= Math.min(total - 1, atual + 1); j++) pages.push(j);
  if (atual < total - 2) pages.push('...');
  pages.push(total);
  return pages;
}

function irPagina(n) {
  var lista = getRegistrosFiltrados();
  var totalPags = Math.max(1, Math.ceil(lista.length / APP.itensPorPagina));
  if (n < 1 || n > totalPags) return;
  APP.paginaAtual = n;
  renderizarTabela();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// === MODAL ===
function abrirModal(tr) {
  var idx = parseInt(tr.dataset.idx);
  var lista = getRegistrosFiltrados();
  var reg = lista[idx];
  if (!reg) return;
  preencherModalDiligencia(reg);
}

// Preenche e abre o modal de Diligencia a partir de um registro ja resolvido.
// Reaproveitado pela aba Diligencias (abrirModal) e pela aba Panorama
// (abrirModalPanoramaDiligencia) — mesma UI, mesma regra de edicao/salvamento.
function preencherModalDiligencia(reg) {
  APP.registroAtual = reg;

  document.getElementById('modalProcesso').textContent = reg.processo || '';
  document.getElementById('modalAssistido').textContent = reg.assistido || '';

  document.getElementById('modalBadges').innerHTML = badgeStatus(reg);

  // O aviso de atraso no modal usa a flag "crua" (ehAtraso), nao a versao
  // restrita da tabela (ehAtrasoExibivel): mesmo com Status Real "Entregue",
  // se o prazo (DF) ja passou, o aviso continua aparecendo aqui.
  var alertaEl = document.getElementById('modalAlertaAtraso');
  alertaEl.style.display = ehAtraso(reg) ? 'flex' : 'none';

  document.getElementById('mId').textContent = reg.id || '—';
  document.getElementById('mProcesso').textContent = reg.processo || '—';
  document.getElementById('mAssistido').textContent = reg.assistido || '—';
  document.getElementById('mDiligencia').textContent = reg.diligencia || '—';
  document.getElementById('mDi').textContent = reg.di || '—';
  document.getElementById('mPrazo').textContent = reg.prazo || '—';
  document.getElementById('mDf').textContent = reg.df || '—';
  document.getElementById('mAlteradoEm').textContent = reg.alteradoEm || '—';

  var linkEl = document.getElementById('mLink');
  if (reg.link) {
    linkEl.innerHTML = '<a href="' + reg.link + '" target="_blank" rel="noopener">Abrir no Classroom</a>';
  } else {
    linkEl.textContent = '—';
  }
  document.getElementById('mDiClass').textContent = reg.diClass || '—';
  document.getElementById('mDfClass').textContent = reg.dfClass || '—';

  preencherEdicaoModal(reg);

  document.getElementById('modalOverlay').classList.add('visivel');
}

// Abre o modal de Diligencia a partir da tabela da aba Panorama.
function abrirModalPanoramaDiligencia(idx) {
  var lista = getDiligenciasPanoramaFiltradas();
  var reg = lista[idx];
  if (!reg) return;
  preencherModalDiligencia(reg);
}

function popularSelectSimples(select, valores, valorAtual, placeholder) {
  select.innerHTML = '<option value="">' + placeholder + '</option>';
  var incluidos = {};
  (valores || []).forEach(function(v) {
    var chave = normalizarChave(v);
    if (!chave || incluidos[chave]) return;
    incluidos[chave] = true;
    var opt = document.createElement('option');
    opt.value = v;
    opt.textContent = v;
    if (chave === normalizarChave(valorAtual)) opt.selected = true;
    select.appendChild(opt);
  });
  if (valorAtual && !incluidos[normalizarChave(valorAtual)]) {
    var optAtual = document.createElement('option');
    optAtual.value = valorAtual;
    optAtual.textContent = valorAtual;
    optAtual.selected = true;
    select.appendChild(optAtual);
  }
}

// SUBESPECIE (Peça Simples/Complexa) nunca e escolhida manualmente: e sempre
// derivada de ESPECIE. Este calculo espelha calcularSubespecie() no backend
// (Data.js) apenas para dar uma previa instantanea no modal; o valor gravado
// de fato e sempre recalculado no servidor ao salvar.
function calcularSubespeciePreview(especie) {
  var chave = normalizarChave(especie);
  if (!chave) return '';
  var complexas = APP.dados.picklists.complexas || [];
  for (var i = 0; i < complexas.length; i++) {
    if (normalizarChave(complexas[i]) === chave) return 'Complexa';
  }
  return 'Simples';
}

function atualizarDisplaySubespecie() {
  var especieAtual = document.getElementById('editEspecie').value;
  var valor = calcularSubespeciePreview(especieAtual);
  document.getElementById('displaySubespecie').textContent = valor || '—';
}

function preencherEdicaoModal(reg) {
  popularSelectSimples(document.getElementById('editEstagiario'), APP.dados.estagiarios, reg.estagiario, '— Não atribuído —');
  popularSelectSimples(document.getElementById('editVara'), APP.dados.picklists.vara, reg.vara, '— Não informado —');
  popularSelectSimples(document.getElementById('editEspecie'), APP.dados.picklists.especie, reg.especie, '— Não informado —');

  var selectStatus = document.getElementById('editStatus');
  var statusAtualUI = normalizarStatusParaUI(reg.status);

function copiarProcesso() {
  var reg = APP.registroAtual;
  var processo = reg ? String(reg.processo || '') : '';
  if (!processo) return;

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(processo).then(function() {
      mostrarToast('Processo copiado!', 'sucesso');
    }, function() { copiarProcessoFallback(processo); });
  } else {
    copiarProcessoFallback(processo);
  }
}

function copiarProcessoFallback(texto) {
  var input = document.createElement('textarea');
  input.value = texto;
  input.style.position = 'fixed';
  input.style.opacity = '0';
  document.body.appendChild(input);
  input.focus();
  input.select();
  var ok = false;
  try { ok = document.execCommand('copy'); } catch (e) { ok = false; }
  document.body.removeChild(input);
  mostrarToast(ok ? 'Processo copiado!' : 'Não foi possível copiar o processo.', ok ? 'sucesso' : 'erro');
}

var btnCopiarProcesso = document.getElementById('btnCopiarProcesso');
btnCopiarProcesso.addEventListener('click', function(e) { e.stopPropagation(); copiarProcesso(); });
btnCopiarProcesso.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); copiarProcesso(); }
});

function salvarModal() {
  var reg = APP.registroAtual;
  if (!reg) return;

  // subespecie nao entra no payload: e sempre calculada e gravada pelo
  // servidor a partir de especie (ver calcularSubespecie em Data.js).
  var payload = {
    _linha: reg._linha,
    estagiario: document.getElementById('editEstagiario').value,
    status: normalizarStatusParaUI(document.getElementById('editStatus').value),
    obs: document.getElementById('editObs').value,
    especie: document.getElementById('editEspecie').value,
    vara: document.getElementById('editVara').value
  };

  var btnSalvar = document.getElementById('btnSalvar');
  btnSalvar.disabled = true;
  btnSalvar.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px;">hourglass_top</span> Salvando...';

  google.script.run
    .withSuccessHandler(function(res) {
      btnSalvar.disabled = false;
      btnSalvar.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px;">save</span> Salvar';
      if (!res.sucesso) {
        mostrarToast(res.erro || 'Erro ao salvar.', 'erro');
        return;
      }
      if (res.geral && res.geral.sucesso === false) {
        mostrarToast('Registro salvo, mas falhou o envio para GERAL: ' + res.geral.erro, 'alerta');
      } else if (res.secretaria && res.secretaria.quantidade > 0) {
        mostrarToast('Registro salvo e enviado para a secretaria.', 'sucesso');
      } else if (normalizarChave(payload.status) === 'protocolado' && res.secretaria) {
        mostrarToast('Registro salvo, mas não enviado para a secretaria. Verifique processo preenchido e se a coluna U ja esta marcada.', 'alerta');
      } else {
        mostrarToast('Registro salvo com sucesso!', 'sucesso');
      }
      var linhaReg = reg._linha;
      APP.dados.diligencias.forEach(function(r) {
        if (r._linha === linhaReg) {
          r.estagiario = payload.estagiario;
          r.status     = payload.status;
          r.especie    = payload.especie;
          r.subespecie = res.subespecie;
          r.vara       = payload.vara;
          r.obs        = payload.obs;
          r.alteradoEm = res.alteradoEm;
        }
      });
      fecharModal();
      renderizarCards();
      renderizarTabela();
      recarregarAposEdicao();
      if (APP.vistaAtual === 'panorama') carregarAbaPanorama();
      if (APP.vistaAtual === 'geral') carregarAbaGeral();
    })
    .withFailureHandler(function(err) {
      btnSalvar.disabled = false;
      btnSalvar.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px;">save</span> Salvar';
      mostrarToast('Erro: ' + err.message, 'erro');
    })
    .salvarRegistro(payload);
}

// Varre a tabela renderizada e devolve so as linhas com um estagiario
// escolhido no select inline — sao essas que vao para o payload do "Salvar".
function coletarSelecionadosDistribuicao() {
  var lista = getRegistrosFiltradosDistribuicao();
  var selecionados = [];
  lista.forEach(function(reg) {
    var select = document.getElementById('distEst_' + reg._linha);
    var valor = select ? select.value : '';
    if (valor) selecionados.push({ _linha: reg._linha, id: reg.id, estagiario: valor });
  });
  return selecionados;
}

// enviar = false -> botao "Salvar" (so grava o estagiario e muda o status).
// enviar = true  -> botao "Salvar e Enviar" (grava e cria a atividade no
// Classroom so para os registros distribuidos nesta acao — ver
// salvarDistribuicao em Distribuicao.js).
function acaoSalvarDistribuicaoClique(enviar) {
  var selecionados = coletarSelecionadosDistribuicao();
  if (selecionados.length === 0) {
    mostrarToast('Selecione ao menos um estagiário antes de salvar.', 'alerta');
    return;
  }

  var btnSalvar = document.getElementById('btnSalvarDistribuicao');
  var btnEnviar = document.getElementById('btnSalvarEnviarDistribuicao');
  var textoOriginalSalvar = btnSalvar.innerHTML;
  var textoOriginalEnviar = btnEnviar.innerHTML;

  btnSalvar.disabled = true;
  btnEnviar.disabled = true;
  if (enviar) {
    btnEnviar.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px;vertical-align:-3px;margin-right:4px;">hourglass_top</span> Enviando...';
  } else {
    btnSalvar.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px;vertical-align:-3px;margin-right:4px;">hourglass_top</span> Salvando...';
  }

  google.script.run
    .withSuccessHandler(function(res) {
      btnSalvar.disabled = false;
      btnEnviar.disabled = false;
      btnSalvar.innerHTML = textoOriginalSalvar;
      btnEnviar.innerHTML = textoOriginalEnviar;

      if (!res.sucesso) {
        mostrarToast(res.erro || 'Erro ao salvar distribuição.', 'erro');
        return;
      }

      var totalSalvos = (res.salvos || []).length;
      var totalEnviados = (res.enviados || []).length;
      var totalErros = (res.erros || []).length;

      if (enviar) {
        if (totalErros === 0) {
          mostrarToast(totalSalvos + ' registro(s) distribuído(s) e ' + totalEnviados + ' enviado(s) ao Classroom!', 'sucesso');
        } else {
          mostrarToast(totalSalvos + ' distribuído(s), ' + totalEnviados + ' enviado(s) ao Classroom, ' + totalErros + ' com erro. Veja o console.', 'alerta');
          console.error('Erros na distribuição:', res.erros);
        }
      } else {
        if (totalErros === 0) {
          mostrarToast(totalSalvos + ' registro(s) distribuído(s) com sucesso!', 'sucesso');
        } else {
          mostrarToast(totalSalvos + ' distribuído(s), ' + totalErros + ' com erro. Veja o console.', 'alerta');
          console.error('Erros na distribuição:', res.erros);
        }
      }

      // Os registros salvos (com ou sem falha no envio ao Classroom) ja
      // deixam de pertencer a fila "sem estagiario" — removidos localmente
      // para nao esperar um novo carregamento completo da aba.
      var linhasSalvas = {};
      (res.salvos || []).forEach(function(s) { linhasSalvas[s._linha] = true; });
      APP.dados.distribuicao = (APP.dados.distribuicao || []).filter(function(r) {
        return !linhasSalvas[r._linha];
      });

      renderizarTabelaDistribuicao();
      // A aba Diligencias (e o Panorama/Geral, se abertos) precisam refletir o
      // novo estagiario/status assim que possivel.
      recarregarAposEdicao();
      if (APP.vistaAtual === 'panorama') carregarAbaPanorama();
      if (APP.vistaAtual === 'geral') carregarAbaGeral();
    })
    .withFailureHandler(function(err) {
      btnSalvar.disabled = false;
      btnEnviar.disabled = false;
      btnSalvar.innerHTML = textoOriginalSalvar;
      btnEnviar.innerHTML = textoOriginalEnviar;
      mostrarToast('Erro ao salvar distribuição: ' + err.message, 'erro');
    })
    .acaoSalvarDistribuicao({ registros: selecionados, enviarClassroom: !!enviar });
}

    })

    })
    .carregarDadosAbaIniciais();

function getRegistrosFiltradosIniciais() {
  var lista = APP.dados.iniciais || [];

  if (APP_INICIAIS.filtroCard !== 'total') {
    lista = lista.filter(function(r) {
      if (APP_INICIAIS.filtroCard === 'sem_estagiario') return ehSemEstagiario(r);
      return classificarRegistroChaves(r).indexOf(APP_INICIAIS.filtroCard) !== -1;
    });
  }

  if (APP_INICIAIS.busca) {
    var b = normalizar(APP_INICIAIS.busca);
    lista = lista.filter(function(r) {
      return normalizar(r.assistido).includes(b) || normalizar(r.estagiario).includes(b);
    });
  }

  if (APP_INICIAIS.dfDe || APP_INICIAIS.dfAte) {
    var tsDe  = APP_INICIAIS.dfDe  ? converterInputDataParaTimestamp(APP_INICIAIS.dfDe)  : null;
    var tsAte = APP_INICIAIS.dfAte ? converterInputDataParaTimestamp(APP_INICIAIS.dfAte) : null;
    lista = lista.filter(function(r) {
      var ts = converterDataBRParaTimestamp(r.df);
      if (ts === null) return false;
      if (tsDe  !== null && ts < tsDe)  return false;
      if (tsAte !== null && ts > tsAte) return false;
      return true;
    });
  }

  if (APP_INICIAIS.semestreFiltro) {
    lista = lista.filter(function(r) { return r.semestre === APP_INICIAIS.semestreFiltro; });
  }

  lista = lista.slice().sort(function(a, b) {
    return compararRegistros(a, b, APP_INICIAIS.ordenacao.coluna, APP_INICIAIS.ordenacao.direcao);
  });

  return lista;
}

    lista = lista.filter(function(r) { return r.semestre === APP_INICIAIS.semestreFiltro; });
  }

    { id: 'concluido',      label: 'OK / PROTOCOLADO', num: c.concluido,      classe: 'card-concluido' },

    seta = '<span class="th-seta">' + simbolo + '</span>';
  }
  return '<th class="th-ordenavel" onclick="ordenarPorIniciais(\'' + coluna + '\')">' + label + seta + '</th>';
}

function ordenarPorIniciais(coluna) {
  if (APP_INICIAIS.ordenacao.coluna === coluna) {
    APP_INICIAIS.ordenacao.direcao = (APP_INICIAIS.ordenacao.direcao === 'asc') ? 'desc' : 'asc';
  } else {
    APP_INICIAIS.ordenacao.coluna = coluna;
    APP_INICIAIS.ordenacao.direcao = 'asc';
  }
  APP_INICIAIS.paginaAtual = 1;
  renderizarTabelaIniciais();
}

function renderizarTabelaIniciais() {
  var lista = getRegistrosFiltradosIniciais();
  var total = lista.length;
  var totalPags = Math.max(1, Math.ceil(total / APP_INICIAIS.itensPorPagina));
  if (APP_INICIAIS.paginaAtual > totalPags) APP_INICIAIS.paginaAtual = totalPags;

  var inicio = (APP_INICIAIS.paginaAtual - 1) * APP_INICIAIS.itensPorPagina;
  var fim = Math.min(inicio + APP_INICIAIS.itensPorPagina, total);
  var pagina = lista.slice(inicio, fim);

  document.getElementById('tabelaInfoIniciais').innerHTML =
    '<strong>' + total + '</strong> registro(s) — ' + descricaoFiltroIniciais();

  document.getElementById('tabelaCabecalhoIniciais').innerHTML =
    '<tr>' +
      thOrdenavelIniciais('ID', 'id') +
      thOrdenavelIniciais('ASSISTIDO(A)', 'assistido') +
      thOrdenavelIniciais('ESTAGIÁRIO(A)', 'estagiario') +
      thOrdenavelIniciais('DATA', 'di') +
      thOrdenavelIniciais('DF', 'df') +
      thOrdenavelIniciais('STATUS', 'status') +
      thOrdenavelIniciais('PROCESSO', 'processo') +
      thOrdenavelIniciais('VARA', 'vara') +
    '</tr>';

  if (pagina.length === 0) {
    document.getElementById('tabelaCorpoIniciais').innerHTML =
      '<tr><td colspan="8">' +
        '<div class="estado-vazio">' +
          '<span class="material-symbols-outlined">search_off</span>' +
          '<div class="estado-vazio-titulo">Nenhum registro encontrado</div>' +
          '<div class="estado-vazio-desc">Tente ajustar o filtro ou a busca.</div>' +
        '</div>' +
      '</td></tr>';
  } else {
    var html = '';
    pagina.forEach(function(reg, idx) {
      var classeAtraso = ehAtraso(reg) ? ' linha-atraso' : '';
      html += '<tr class="' + classeAtraso + '" onclick="abrirModalIniciais(this)" data-idx="' + (inicio + idx) + '">' +
        '<td class="td-numero">' + (reg.id || '') + '</td>' +
        '<td class="td-assistido">' + (reg.assistido || '') + '</td>' +
        '<td>' + renderizarCelulaEstagiario(reg) + '</td>' +
        '<td>' + (reg.di || '') + '</td>' +
        '<td>' + (reg.df || '') + '</td>' +
        '<td>' + badgeStatus(reg) + '</td>' +
        '<td>' + (reg.processo || '<span class="celula-vazio">—</span>') + '</td>' +
        '<td>' + (reg.vara || '<span class="celula-vazio">—</span>') + '</td>' +
      '</tr>';
    });
    document.getElementById('tabelaCorpoIniciais').innerHTML = html;
  }

  renderizarPaginacaoIniciais(total, totalPags);
}

function renderizarPaginacaoIniciais(total, totalPags) {
  var p = APP_INICIAIS.paginaAtual;
  var inicio = (p - 1) * APP_INICIAIS.itensPorPagina + 1;
  var fim = Math.min(p * APP_INICIAIS.itensPorPagina, total);

  var html = '';
  if (total > 0) html += '<span class="pag-info">' + inicio + '–' + fim + ' de ' + total + '</span>';

  html += '<button class="btn-pag" onclick="irPaginaIniciais(' + (p - 1) + ')" ' + (p <= 1 ? 'disabled' : '') + '>' +
    '<span class="material-symbols-outlined">chevron_left</span> Ant.' +
  '</button>';

  var range = pagRange(p, totalPags);
  range.forEach(function(n) {
    if (n === '...') {
      html += '<span class="pag-info">…</span>';
    } else {
      html += '<button class="btn-pag' + (n === p ? ' pag-ativo' : '') + '" onclick="irPaginaIniciais(' + n + ')">' + n + '</button>';
    }
  });

  html += '<button class="btn-pag" onclick="irPaginaIniciais(' + (p + 1) + ')" ' + (p >= totalPags ? 'disabled' : '') + '>' +
    'Próx. <span class="material-symbols-outlined">chevron_right</span>' +
  '</button>';

  document.getElementById('paginacaoIniciais').innerHTML = html;
}

function irPaginaIniciais(n) {
  var lista = getRegistrosFiltradosIniciais();
  var totalPags = Math.max(1, Math.ceil(lista.length / APP_INICIAIS.itensPorPagina));
  if (n < 1 || n > totalPags) return;
  APP_INICIAIS.paginaAtual = n;
  renderizarTabelaIniciais();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function popularSelectSemestreIniciais() {
  var select = document.getElementById('selectSemestreIniciais');
  if (!select) return;

  var presentes = {};
  (APP.dados.iniciais || []).forEach(function(r) {
    if (r.semestre) presentes[r.semestre] = true;
  });

  var semestres = Object.keys(presentes).sort().reverse();
  var valorAtual = APP_INICIAIS.semestreFiltro;

  select.innerHTML = '<option value="">— Todos os semestres —</option>';
  semestres.forEach(function(s) {
    var opt = document.createElement('option');
    opt.value = s;
    opt.textContent = s;
    if (s === valorAtual) opt.selected = true;
    select.appendChild(opt);
  });
}

function mudarSemestreIniciais(valor) {
  APP_INICIAIS.semestreFiltro = valor || '';
  APP_INICIAIS.paginaAtual = 1;
  renderizarCardsIniciais();
  renderizarTabelaIniciais();
}

function limparFiltroDatasIniciais() {
  APP_INICIAIS.dfDe = '';
  APP_INICIAIS.dfAte = '';
  APP_INICIAIS.paginaAtual = 1;
  var inputDe  = document.getElementById('inputDfDeIniciais');

function inicializarFiltrosIniciais() {
  var inputBusca = document.getElementById('inputBuscaIniciais');

  var inputAte   = document.getElementById('inputDfAteIniciais');

    inputAte.addEventListener('change', aplicarDatas);
  }
}

function preencherModalInicial(reg) {
  APP_INICIAIS.registroAtual = reg;

  document.getElementById('miAssistido').textContent = reg.assistido || '';
  document.getElementById('miBadges').innerHTML = badgeStatus(reg);

  // Mesma logica do modal de Diligencia: aviso usa a flag crua (ehAtraso),

  document.getElementById('miCpf').textContent = reg.cpf || '—';

  document.getElementById('miData').textContent = reg.di || '—';

  document.getElementById('miVara').textContent = reg.vara || '—';
  document.getElementById('miAlteradoEm').textContent = reg.alteradoEm || '—';
  document.getElementById('miObs').textContent = reg.obs || '—';

  var linkEl = document.getElementById('miLink');

    linkEl.innerHTML = '<a href="' + reg.link + '" target="_blank" rel="noopener">Abrir no Classroom</a>';

  document.getElementById('modalIniciaisOverlay').classList.add('visivel');

function copiarProcessoIniciais() {
  var reg = APP_INICIAIS.registroAtual;
  var processo = reg ? String(reg.processo || '') : '';
  if (!processo) return;

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(processo).then(function() {
      mostrarToast('Processo copiado!', 'sucesso');
    }, function() { copiarProcessoFallback(processo); });
  } else {
    copiarProcessoFallback(processo);
  }
}

var btnCopiarProcessoIniciais = document.getElementById('btnCopiarProcessoIniciais');
if (btnCopiarProcessoIniciais) {
  btnCopiarProcessoIniciais.addEventListener('click', function(e) { e.stopPropagation(); copiarProcessoIniciais(); });
  btnCopiarProcessoIniciais.addEventListener('keydown', function(e) {

  });
}

function salvarModalIniciais() {
  var reg = APP_INICIAIS.registroAtual;
  if (!reg) return;

  var payload = {
    _linha: reg._linha,
    status: normalizarStatusParaUI(document.getElementById('miEditStatus').value)
  };

  var btnSalvar = document.getElementById('btnSalvarIniciais');
  btnSalvar.disabled = true;
  btnSalvar.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px;">hourglass_top</span> Salvando...';

  google.script.run
    .withSuccessHandler(function(res) {
      btnSalvar.disabled = false;
      btnSalvar.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px;">save</span> Salvar';
      if (!res.sucesso) {
        mostrarToast(res.erro || 'Erro ao salvar.', 'erro');
        return;
      }
      mostrarToast('Registro salvo com sucesso!', 'sucesso');
      fecharModalIniciais();
      carregarAbaIniciais();
      if (APP.vistaAtual === 'panorama') carregarAbaPanorama();
      if (APP.vistaAtual === 'geral') carregarAbaGeral();
    })
    .withFailureHandler(function(err) {
      btnSalvar.disabled = false;
      btnSalvar.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px;">save</span> Salvar';
      mostrarToast('Erro: ' + err.message, 'erro');
    })
    .salvarRegistroInicial(payload);
}

// === ABA: ACOMPANHAMENTOS ===
// Estado especifico da aba Acompanhamentos (independente das demais abas).
// Reaproveita as funcoes genericas ja existentes (classificarRegistro,
// badgeStatus, renderizarCelulaEstagiario, compararRegistros etc.) porque
// os objetos vindos do servidor usam os mesmos nomes de campo (estagiario,
// di, df, status, atraso, gatilho, semestre) — ver Acompanhamentos.js.
var APP_ACOMPANHAMENTOS = {
  filtroCard: 'total',
  busca: '',
  dfDe: '',
  dfAte: '',
  semestreFiltro: obterSemestreAtual(),
  ordenacao: { coluna: 'id', direcao: 'asc' },
  paginaAtual: 1,
  itensPorPagina: 20,
  registroAtual: null
};

// Chamada toda vez que a aba "Acompanhamentos" e aberta — sempre busca
// dados novos do servidor.
function carregarAbaAcompanhamentos() {
  var wrapper = document.getElementById('secaoAcompanhamentos');
  if (wrapper) wrapper.style.opacity = '0.5';

  google.script.run
    .withSuccessHandler(function(resultado) {
      if (wrapper) wrapper.style.opacity = '1';
      if (resultado.erro) {
        mostrarToast(resultado.erro, 'erro');
        return;
      }
      APP.dados.acompanhamentos = resultado.acompanhamentos || [];
      APP.dados.statusPicklist = resultado.statusPicklist || [];
      popularSelectSemestreAcompanhamentos();
      renderizarCardsAcompanhamentos();
      renderizarTabelaAcompanhamentos();
    })
    .withFailureHandler(function(err) {
      if (wrapper) wrapper.style.opacity = '1';
      mostrarToast('Erro ao carregar Acompanhamentos: ' + err.message, 'erro');
    })
    .carregarDadosAbaAcompanhamentos();
}

function getRegistrosFiltradosAcompanhamentos() {
  var lista = APP.dados.acompanhamentos || [];

  if (APP_ACOMPANHAMENTOS.filtroCard !== 'total') {
    lista = lista.filter(function(r) {
      if (APP_ACOMPANHAMENTOS.filtroCard === 'sem_estagiario') return ehSemEstagiario(r);
      return classificarRegistroChaves(r).indexOf(APP_ACOMPANHAMENTOS.filtroCard) !== -1;
    });
  }

  if (APP_ACOMPANHAMENTOS.busca) {
    var b = normalizar(APP_ACOMPANHAMENTOS.busca);
    lista = lista.filter(function(r) {
      return normalizar(r.processo).includes(b) || normalizar(r.estagiario).includes(b);
    });
  }

  if (APP_ACOMPANHAMENTOS.dfDe || APP_ACOMPANHAMENTOS.dfAte) {
    var tsDe  = APP_ACOMPANHAMENTOS.dfDe  ? converterInputDataParaTimestamp(APP_ACOMPANHAMENTOS.dfDe)  : null;
    var tsAte = APP_ACOMPANHAMENTOS.dfAte ? converterInputDataParaTimestamp(APP_ACOMPANHAMENTOS.dfAte) : null;
    lista = lista.filter(function(r) {
      var ts = converterDataBRParaTimestamp(r.df);
      if (ts === null) return false;
      if (tsDe  !== null && ts < tsDe)  return false;
      if (tsAte !== null && ts > tsAte) return false;
      return true;
    });
  }

  if (APP_ACOMPANHAMENTOS.semestreFiltro) {
    lista = lista.filter(function(r) { return r.semestre === APP_ACOMPANHAMENTOS.semestreFiltro; });
  }

  lista = lista.slice().sort(function(a, b) {
    return compararRegistros(a, b, APP_ACOMPANHAMENTOS.ordenacao.coluna, APP_ACOMPANHAMENTOS.ordenacao.direcao);
  });

  return lista;
}

function renderizarCardsAcompanhamentos() {
  var lista = APP.dados.acompanhamentos || [];
  if (APP_ACOMPANHAMENTOS.semestreFiltro) {
    lista = lista.filter(function(r) { return r.semestre === APP_ACOMPANHAMENTOS.semestreFiltro; });
  }
  var c = contarPorClassificacao(lista);

  // "Protocolado" nunca se aplica a Acompanhamentos, entao o card usa
  // apenas o rotulo "OK" (em Diligencias/Iniciais o mesmo card mostra "OK / PROTOCOLADO").
  var cards = [
    { id: 'total',          label: 'TOTAL',            num: c.total,          classe: 'card-total' },
    { id: 'encaminhado',    label: 'ENCAMINHADOS',    num: c.encaminhado,    classe: 'card-encaminhado' },
    { id: 'entregue',       label: 'ENTREGUES',        num: c.entregue,       classe: 'card-entregue' },
    { id: 'devolvida',      label: 'DEVOLVIDAS',      num: c.devolvida,      classe: 'card-devolvida' },
    { id: 'concluido',      label: 'OK',               num: c.concluido,      classe: 'card-concluido' },
    { id: 'cancelada',      label: 'CANCELADAS',      num: c.cancelada,      classe: 'card-cancelada' },
    { id: 'atraso',         label: 'EM ATRASO',        num: c.atraso,         classe: 'card-atraso' },
    { id: 'sem_estagiario', label: 'SEM ESTAGIÁRIO',  num: c.sem_estagiario, classe: 'card-sem-estagiario' }
  ];

  var html = '';
  cards.forEach(function(card) {
    var ativo = APP_ACOMPANHAMENTOS.filtroCard === card.id ? ' ativo' : '';
    var icone = CARD_ICONES[card.id] || 'folder';
    html += '<div class="card-resumo ' + card.classe + ativo + '" onclick="filtrarCardAcompanhamentos(\'' + card.id + '\')">' +
      '<div class="card-icone"><span class="material-symbols-outlined">' + icone + '</span></div>' +
      '<div class="card-info">' +
        '<div class="card-numero">' + card.num + '</div>' +
        '<div class="card-label">' + card.label + '</div>' +
      '</div>' +
    '</div>';
  });

  document.getElementById('cardsGridAcompanhamentos').innerHTML = html;
}

  if (APP_ACOMPANHAMENTOS.ordenacao.coluna === coluna) {

  if (pagina.length === 0) {

          '<div class="estado-vazio-titulo">Nenhum registro encontrado</div>' +
          '<div class="estado-vazio-desc">Tente ajustar o filtro ou a busca.</div>' +
        '</div>' +
      '</td></tr>';
  } else {

      html += '<tr class="' + classeAtraso + '" onclick="abrirModalAcompanhamento(this)" data-idx="' + (inicio + idx) + '">' +

        '<td>' + renderizarCelulaEstagiario(reg) + '</td>' +

function renderizarPaginacaoAcompanhamentos(total, totalPags) {
  var p = APP_ACOMPANHAMENTOS.paginaAtual;
  var inicio = (p - 1) * APP_ACOMPANHAMENTOS.itensPorPagina + 1;
  var fim = Math.min(p * APP_ACOMPANHAMENTOS.itensPorPagina, total);

  var html = '';
  if (total > 0) html += '<span class="pag-info">' + inicio + '–' + fim + ' de ' + total + '</span>';

  html += '<button class="btn-pag" onclick="irPaginaAcompanhamentos(' + (p - 1) + ')" ' + (p <= 1 ? 'disabled' : '') + '>' +
    '<span class="material-symbols-outlined">chevron_left</span> Ant.' +
  '</button>';

  var range = pagRange(p, totalPags);
  range.forEach(function(n) {
    if (n === '...') {
      html += '<span class="pag-info">…</span>';
    } else {
      html += '<button class="btn-pag' + (n === p ? ' pag-ativo' : '') + '" onclick="irPaginaAcompanhamentos(' + n + ')">' + n + '</button>';
    }
  });

  html += '<button class="btn-pag" onclick="irPaginaAcompanhamentos(' + (p + 1) + ')" ' + (p >= totalPags ? 'disabled' : '') + '>' +
    'Próx. <span class="material-symbols-outlined">chevron_right</span>' +
  '</button>';

  document.getElementById('paginacaoAcompanhamentos').innerHTML = html;
}

function irPaginaAcompanhamentos(n) {
  var lista = getRegistrosFiltradosAcompanhamentos();
  var totalPags = Math.max(1, Math.ceil(lista.length / APP_ACOMPANHAMENTOS.itensPorPagina));
  if (n < 1 || n > totalPags) return;
  APP_ACOMPANHAMENTOS.paginaAtual = n;
  renderizarTabelaAcompanhamentos();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function popularSelectSemestreAcompanhamentos() {
  var select = document.getElementById('selectSemestreAcompanhamentos');
  if (!select) return;

  var presentes = {};
  (APP.dados.acompanhamentos || []).forEach(function(r) {
    if (r.semestre) presentes[r.semestre] = true;
  });

  var semestres = Object.keys(presentes).sort().reverse();
  var valorAtual = APP_ACOMPANHAMENTOS.semestreFiltro;

  select.innerHTML = '<option value="">— Todos os semestres —</option>';
  semestres.forEach(function(s) {
    var opt = document.createElement('option');
    opt.value = s;
    opt.textContent = s;
    if (s === valorAtual) opt.selected = true;
    select.appendChild(opt);
  });
}

function mudarSemestreAcompanhamentos(valor) {

var GRAFICOS_CATEGORIAS = [
  { chave: 'complexas',       label: 'Complexas',       icone: 'gavel',          classe: 'grafico-barra-complexas' },
  { chave: 'simples',         label: 'Simples',         icone: 'description',    classe: 'grafico-barra-simples' },
  { chave: 'acompanhamentos', label: 'Acompanhamentos', icone: 'timeline',       classe: 'grafico-barra-acompanhamentos' },
  { chave: 'atendimentos',    label: 'Atendimentos',    icone: 'support_agent',  classe: 'grafico-barra-atendimentos' },
  { chave: 'iniciais',        label: 'Iniciais',        icone: 'history_edu',    classe: 'grafico-barra-iniciais' }
];

function categoriasGraficosPorChaves(chaves) {
  return GRAFICOS_CATEGORIAS.filter(function(c) { return chaves.indexOf(c.chave) !== -1; });
}

// Arredonda o topo do eixo Y para um numero "redondo" (1/2/5 x 10^n), a
// mesma tecnica usada por qualquer biblioteca de graficos para gerar
// gridlines com valores legiveis (ex.: 20, nunca 17).
function arredondarMaximoEixoGraficos(valor) {
  if (valor <= 0) return 1;
  var expoente = Math.pow(10, Math.floor(Math.log(valor) / Math.LN10));
  var fracao = valor / expoente;
  var fracaoArredondada = fracao <= 1 ? 1 : (fracao <= 2 ? 2 : (fracao <= 5 ? 5 : 10));
  return fracaoArredondada * expoente;
}

function renderizarGraficos() {
  var dados = APP.dados.graficos || {};
  var totais = dados.totais || {};
  var totalAtivos = dados.totalAlunosAtivos || 0;

  var subtitulo = document.getElementById('graficosSubtitulo');
  if (subtitulo) {
    subtitulo.textContent = totalAtivos + (totalAtivos === 1 ? ' aluno(a) ativo(a)' : ' alunos(as) ativos(as)');
  }

  var container = document.getElementById('graficosConteudo');
  if (!container) return;

  if (!totalAtivos) {
    container.innerHTML =
      '<div class="estado-vazio">' +
        '<span class="material-symbols-outlined">group_off</span>' +
        '<div class="estado-vazio-titulo">Nenhum aluno ativo encontrado</div>' +
        '<div class="estado-vazio-desc">Os totais aparecem aqui assim que houver estagiários não finalizados.</div>' +
      '</div>';
    return;
  }

  var PLOT_HEIGHT = 170;
  var valorMaximo = 0;
  GRAFICOS_CATEGORIAS.forEach(function(cat) {
    valorMaximo = Math.max(valorMaximo, totais[cat.chave] || 0);
  });
  var eixoMaximo = arredondarMaximoEixoGraficos(valorMaximo);

  var eixoHtml = '';
  for (var i = 4; i >= 0; i--) {
    eixoHtml += '<div class="grafico-linha-eixo"><span>' + Math.round(eixoMaximo * (i / 4)) + '</span></div>';
  }

  var colunasHtml = '';
  GRAFICOS_CATEGORIAS.forEach(function(cat) {
    var valor = totais[cat.chave] || 0;
    var alturaPx = valor > 0 ? Math.max(3, Math.round((valor / eixoMaximo) * PLOT_HEIGHT)) : 0;
    colunasHtml +=
      '<div class="grafico-coluna" title="' + cat.label + ': ' + valor + '">' +
        '<div class="grafico-valor">' + valor + '</div>' +
        '<div class="grafico-barra ' + cat.classe + '" style="height:' + alturaPx + 'px"></div>' +
        '<div class="grafico-rotulo"><span class="material-symbols-outlined">' + cat.icone + '</span>' + cat.label + '</div>' +
      '</div>';
  });

  container.innerHTML =
    '<div class="grafico-area">' +
      '<div class="grafico-eixo">' + eixoHtml + '</div>' +
      '<div class="grafico-colunas">' + colunasHtml + '</div>' +
    '</div>';

  renderizarGraficoPorEstagiario(
    'graficosLegendaPecas', 'graficosEixoPecas', 'graficosPlotPecas',
    categoriasGraficosPorChaves(['complexas', 'simples', 'acompanhamentos']),
    dados.porEstagiario || []
  );
  renderizarGraficoPorEstagiario(
    'graficosLegendaAtendIniciais', 'graficosEixoAtendIniciais', 'graficosPlotAtendIniciais',
    categoriasGraficosPorChaves(['atendimentos', 'iniciais']),

  );

// Grafico de barras agrupadas por estagiario (eixo Y compartilhado entre as
// categorias de UM grafico, area rolavel na horizontal para caber qualquer
// quantidade de alunos ativos — ver .grafico-multi-* em Styles.html).
function renderizarGraficoPorEstagiario(idLegenda, idEixo, idPlot, categorias, porEstagiario) {
  var legendaEl = document.getElementById(idLegenda);
  if (legendaEl) {
    legendaEl.innerHTML = categorias.map(function(cat) {
      return '<span class="legenda-item"><span class="legenda-dot ' + cat.classe + '"></span> ' + cat.label + '</span>';
    }).join('');
  }

  var eixoEl = document.getElementById(idEixo);
  var plotEl = document.getElementById(idPlot);
  if (!eixoEl || !plotEl) return;

  if (!porEstagiario.length) {
    eixoEl.innerHTML = '';
    plotEl.innerHTML =
      '<div class="estado-vazio">' +
        '<span class="material-symbols-outlined">group_off</span>' +
        '<div class="estado-vazio-titulo">Nenhum aluno ativo encontrado</div>' +
      '</div>';
    return;
  }

  var PLOT_HEIGHT = 170;
  var valorMaximo = 0;
  porEstagiario.forEach(function(a) {
    categorias.forEach(function(cat) { valorMaximo = Math.max(valorMaximo, a[cat.chave] || 0); });
  });
  var eixoMaximo = arredondarMaximoEixoGraficos(valorMaximo);

  var eixoHtml = '';
  var gridHtml = '';
  for (var i = 4; i >= 0; i--) {
    eixoHtml += '<span>' + Math.round(eixoMaximo * (i / 4)) + '</span>';
    gridHtml += '<div class="grafico-linha-eixo"></div>';
  }
  eixoEl.innerHTML = eixoHtml;

  var gruposHtml = '';
  porEstagiario.forEach(function(a) {
    var barrasHtml = categorias.map(function(cat) {
      var valor = a[cat.chave] || 0;
      var alturaPx = valor > 0 ? Math.max(3, Math.round((valor / eixoMaximo) * PLOT_HEIGHT)) : 0;
      return '<div class="grafico-mini-barra ' + cat.classe + '" style="height:' + alturaPx + 'px" ' +
        'data-valor="' + valor + '" title="' + a.nome + ' — ' + cat.label + ': ' + valor + '"></div>';
    }).join('');
    gruposHtml +=
      '<div class="grafico-grupo">' +
        '<div class="grafico-grupo-barras">' + barrasHtml + '</div>' +
        '<div class="grafico-grupo-nome" title="' + a.nome + '">' + a.primeiroNome + '</div>' +
      '</div>';
  });

  plotEl.innerHTML =
    '<div class="grafico-multi-gridlines">' + gridHtml + '</div>' +
    '<div class="grafico-multi-grupos">' + gruposHtml + '</div>';

  // Largura do conteudo (todos os grupos + gaps) medida apos a insercao no
  // DOM; se for menor que a area visivel, a barra estica para preencher
  // (mesmo efeito do grafico de cima); se for maior, vira scroll horizontal.
  var gruposEl = plotEl.querySelector('.grafico-multi-grupos');
  var larguraConteudo = gruposEl.scrollWidth;
  var larguraDisponivel = plotEl.parentElement.clientWidth;
  plotEl.style.width = Math.max(larguraConteudo, larguraDisponivel) + 'px';
}

function popularSelectSemestrePanorama() {
  var select = document.getElementById('selectSemestrePanorama');
  if (!select) return;

  var presentes = {};
  (APP.dados.panoramaEstagiarios || []).forEach(function(e) {
    if (e.semestre) presentes[e.semestre] = true;
  });
  if (APP_PANORAMA.semestreFiltro) presentes[APP_PANORAMA.semestreFiltro] = true;

  var semestres = Object.keys(presentes).sort().reverse();

  if (semestres.length === 0) {
    select.innerHTML = '<option value="">— Nenhum semestre encontrado —</option>';
    return;
  }

  if (semestres.indexOf(APP_PANORAMA.semestreFiltro) === -1) {
    APP_PANORAMA.semestreFiltro = semestres[0];
  }

  select.innerHTML = '';
  semestres.forEach(function(s) {
    var opt = document.createElement('option');
    opt.value = s;
    opt.textContent = s;
    if (s === APP_PANORAMA.semestreFiltro) opt.selected = true;
    select.appendChild(opt);
  });
}

// --- Alunos do semestre escolhido ---

function getAlunosDoSemestrePanorama() {
  var sem = APP_PANORAMA.semestreFiltro;
  return (APP.dados.panoramaEstagiarios || [])
    .filter(function(e) { return e.semestre === sem; })
    .sort(function(a, b) { return normalizar(a.nome) < normalizar(b.nome) ? -1 : 1; });
}

// Conjunto de alunos a considerar nos cards/tabelas: so o selecionado, ou
// todos os alunos do semestre quando nenhum estiver selecionado.
function getConjuntoAlunosPanorama() {
  var alunos = getAlunosDoSemestrePanorama();
  if (APP_PANORAMA.alunoSelecionado) {
    alunos = alunos.filter(function(a) { return a.email === APP_PANORAMA.alunoSelecionado; });
  }
  return alunos;
}

function popularSelectAlunoPanorama() {
  var select = document.getElementById('selectAlunoPanorama');
  if (!select) return;

  var alunos = getAlunosDoSemestrePanorama();
  var valorAtual = APP_PANORAMA.alunoSelecionado;

  select.innerHTML = '<option value="">— Todos os alunos —</option>';
  alunos.forEach(function(a) {
    var opt = document.createElement('option');
    opt.value = a.email;
    opt.textContent = a.nome + (a.finalizado ? ' — Finalizado' : '');
    if (a.finalizado) opt.className = 'opcao-finalizada';
    if (a.email === valorAtual) opt.selected = true;
    select.appendChild(opt);
  });

  // Se o aluno que estava selecionado nao pertence mais ao semestre atual
  // (troca de semestre), volta para "Todos os alunos".
  var aindaExiste = alunos.some(function(a) { return a.email === valorAtual; });
  if (valorAtual && !aindaExiste) {
    APP_PANORAMA.alunoSelecionado = null;
    select.value = '';
  }
}

// --- Registros filtrados (semestre + conjunto de alunos em foco) ---
// Diligencias sao cruzadas pelo nome em ESTAGIARIO(A); Iniciais pelo E-MAIL —
// mesmas chaves ja usadas nas abas Diligencias e Iniciais.
//
// Semestre: diligencias.semestre, iniciais.semestre e estagiarios.semestre
// sao todos texto simples (ex. "2026.01"), preenchidos manualmente por
// Thales — comparados diretamente, sem calcular nada a partir de datas.

function getDiligenciasPanoramaFiltradas() {
  var sem = APP_PANORAMA.semestreFiltro;
  var nomes = {};
  getConjuntoAlunosPanorama().forEach(function(a) { nomes[normalizarChave(a.nome)] = true; });
  return (APP.dados.panoramaDiligencias || []).filter(function(r) {
    return r.semestre === sem && nomes[normalizarChave(r.estagiario)];
  });
}

function getIniciaisPanoramaFiltradas() {
  var sem = APP_PANORAMA.semestreFiltro;
  var emails = {};
  var nomes = {};
  getConjuntoAlunosPanorama().forEach(function(a) {
    if (a.email) emails[normalizarChave(a.email)] = true;
    if (a.nome) nomes[normalizarChave(a.nome)] = true;
  });
  return (APP.dados.panoramaIniciais || []).filter(function(r) {
    if (r.semestre !== sem) return false;
    var emailOk = !!emails[normalizarChave(r.email)];
    var nomeOk = !!nomes[normalizarChave(r.estagiario)];
    // Mantem o cruzamento principal por e-mail e usa nome como fallback
    // para registros antigos/inconsistentes em que o e-mail nao casa.
    return emailOk || nomeOk;
  });
}

function getAcompanhamentosPanoramaFiltrados() {
  var sem = APP_PANORAMA.semestreFiltro;
  var emails = {};
  var nomes = {};
  getConjuntoAlunosPanorama().forEach(function(a) {
    if (a.email) emails[normalizarChave(a.email)] = true;
    if (a.nome) nomes[normalizarChave(a.nome)] = true;
  });
  return (APP.dados.panoramaAcompanhamentos || []).filter(function(r) {
    if (r.semestre !== sem) return false;
    var emailOk = !!emails[normalizarChave(r.email)];
    var nomeOk = !!nomes[normalizarChave(r.estagiario)];
    return emailOk || nomeOk;
  });
}

function getAtendimentosPanoramaFiltrados() {
  var sem = APP_PANORAMA.semestreFiltro;
  var nomes = {};
  getConjuntoAlunosPanorama().forEach(function(a) { nomes[normalizarChave(a.nome)] = true; });
  return (APP.dados.panoramaAtendimentos || []).filter(function(r) {

}

function renderizarCardsPanorama() {
  var diligencias = getDiligenciasPanoramaFiltradas().filter(naoEhCancelada);
  var iniciais = getIniciaisPanoramaFiltradas().filter(naoEhCancelada);
  var atendimentos = getAtendimentosPanoramaFiltrados();
  var acompanhamentos = getAcompanhamentosPanoramaFiltrados().filter(naoEhCancelada);

  var complexasDiligencias = diligencias.filter(function(r) {
    return normalizarChave(r.subespecie) === 'complexa';
  }).length;
  var simples = diligencias.filter(function(r) {
    return normalizarChave(r.subespecie) === 'simples';
  }).length;
  // Cada inicial conta como uma diligencia complexa.
  var complexas = complexasDiligencias + iniciais.length;
  var total = diligencias.length + iniciais.length;

  var cards = [
    { label: 'TOTAL',          num: total,                   classe: 'card-total',       icone: 'folder_open' },
    { label: 'COMPLEXAS',      num: complexas,               classe: 'card-entregue',    icone: 'gavel' },
    { label: 'SIMPLES',        num: simples,                 classe: 'card-encaminhado', icone: 'description' },
    { label: 'ACOMPANHAMENTOS', num: acompanhamentos.length, classe: 'card-devolvida',   icone: 'timeline' },
    { label: 'ATENDIMENTOS',   num: atendimentos.length,     classe: 'card-concluido',   icone: 'support_agent' }
  ];

  var html = '';
  cards.forEach(function(c) {
    html += '<div class="card-resumo card-resumo-estatico ' + c.classe + '">' +
      '<div class="card-icone"><span class="material-symbols-outlined">' + c.icone + '</span></div>' +
      '<div class="card-info">' +
        '<div class="card-numero">' + c.num + '</div>' +
        '<div class="card-label">' + c.label + '</div>' +
      '</div>' +
    '</div>';
  });

  document.getElementById('cardsGridPanorama').innerHTML = html;
}

// === ABA: GERAL (todas as atividades pendentes) ===
// Mostra diligencias, iniciais e acompanhamentos cujo STATUS nao esta em
// STATUS_FINAIS (ou seja, tudo != Ok, Protocolado e Cancelada), agrupados por
// tipo (mesmo padrao de tabelas usado na aba Panorama). Reaproveita a mesma
// chamada ao servidor do Panorama (carregarDadosPanorama) e os mesmos campos
// em APP.dados — sem recorte de semestre/aluno, ve tudo de uma vez.

// Cada uma das 3 tabelas (Diligencias/Iniciais/Acompanhamentos) tem sua
// propria ordenacao independente, igual ao padrao de APP/APP_INICIAIS/
// APP_ACOMPANHAMENTOS nas demais abas.
var APP_GERAL = {
  ordenacao: {
    diligencias: { coluna: 'id', direcao: 'asc' },
    iniciais: { coluna: 'id', direcao: 'asc' },
    acompanhamentos: { coluna: 'id', direcao: 'asc' }
  }
};

function ordenarPorGeral(tipo, coluna) {
  var estado = APP_GERAL.ordenacao[tipo];
  if (estado.coluna === coluna) {
    estado.direcao = (estado.direcao === 'asc') ? 'desc' : 'asc';
  } else {
    estado.coluna = coluna;
    estado.direcao = 'asc';
  }
  renderizarTabelasGeral();
}

// Reaproveita compararRegistros() (generico, ja usado por Diligencias/
// Iniciais/Acompanhamentos) para ordenar qualquer coluna por tipo.
function thOrdenavelGeral(tipo, label, coluna) {
  var estado = APP_GERAL.ordenacao[tipo];
  var ativo = estado.coluna === coluna;
  var seta = '';
  if (ativo) {
    var simbolo = (estado.direcao === 'asc') ? '▲' : '▼';
    seta = '<span class="th-seta">' + simbolo + '</span>';
  }
  return '<th class="th-ordenavel" onclick="ordenarPorGeral(\'' + tipo + '\',\'' + coluna + '\')">' + label + seta + '</th>';
}

function carregarAbaGeral() {
  var wrapper = document.getElementById('secaoGeral');
  if (wrapper) wrapper.style.opacity = '0.5';

  google.script.run
    .withSuccessHandler(function(resultado) {
      if (wrapper) wrapper.style.opacity = '1';
      if (resultado.erro) {
        mostrarToast(resultado.erro, 'erro');
        return;
      }
      APP.dados.panoramaDiligencias = resultado.diligencias || [];
      APP.dados.panoramaIniciais = resultado.iniciais || [];
      APP.dados.panoramaAcompanhamentos = resultado.acompanhamentos || [];
      // O modal de Inicial depende de statusPicklist — garante que exista
      // mesmo que a aba Iniciais nunca tenha sido aberta nesta sessao.
      if (!APP.dados.statusPicklist || !APP.dados.statusPicklist.length) {
        APP.dados.statusPicklist = resultado.statusPicklist || [];
      }
      renderizarGeral();
    })
    .withFailureHandler(function(err) {
      if (wrapper) wrapper.style.opacity = '1';
      mostrarToast('Erro ao carregar Geral: ' + err.message, 'erro');
    })
    .carregarDadosPanorama();
}

// Reaproveita STATUS_FINAIS (definido em "LOGICA DE CLASSIFICACAO"): um
// registro e "pendente" quando o status nao e nenhum dos finais.
function ehPendenteGeral(reg) {
  return STATUS_FINAIS.indexOf(normalizarChave(reg.status)) === -1;
}
