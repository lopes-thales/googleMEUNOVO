var APP_GERENCIAR_ESTAGIARIOS = {
  lista: []
};

function abrirModalGerenciarEstagiarios() {
  document.getElementById('modalGerenciarEstagiariosOverlay').classList.add('visivel');

  var listaEl = document.getElementById('geListaEstagiarios');
  listaEl.innerHTML = '<div class="ge-vazio" id="geCarregando">Carregando...</div>';

  var btnSalvar = document.getElementById('btnSalvarGerenciarEstagiarios');
  btnSalvar.disabled = true;

  google.script.run
    .withSuccessHandler(function(res) {
      btnSalvar.disabled = false;
      if (!res || !res.sucesso) {
        listaEl.innerHTML = '<div class="ge-vazio">' + ((res && res.erro) || 'Erro ao carregar estagiários.') + '</div>';
        return;
      }
      APP_GERENCIAR_ESTAGIARIOS.lista = res.estagiarios || [];
      renderizarListaGerenciarEstagiarios();
    })
    .withFailureHandler(function(err) {
      btnSalvar.disabled = false;
      listaEl.innerHTML = '<div class="ge-vazio">Erro: ' + err.message + '</div>';
    })
    .acaoListarEstagiariosParaGerenciar();
}

function renderizarListaGerenciarEstagiarios() {
  var listaEl = document.getElementById('geListaEstagiarios');
  var lista = APP_GERENCIAR_ESTAGIARIOS.lista;

  if (!lista.length) {
    listaEl.innerHTML = '<div class="ge-vazio">Nenhum estagiário ativo encontrado.</div>';
    return;
  }

  var html = '';
  lista.forEach(function(e) {
    var idEscapado = String(e.id).replace(/"/g, '&quot;');
    html += '<label class="ge-item">' +
      '<input type="checkbox" class="ge-checkbox" value="' + idEscapado + '">' +
      '<span class="ge-item-nome">' + (e.nome || '') + '</span>' +
      '</label>';
  });
  listaEl.innerHTML = html;
}

function fecharModalGerenciarEstagiarios() {
  document.getElementById('modalGerenciarEstagiariosOverlay').classList.remove('visivel');
}

document.getElementById('modalGerenciarEstagiariosOverlay').addEventListener('click', function(e) {
  if (e.target === this) fecharModalGerenciarEstagiarios();
});

function salvarGerenciarEstagiarios() {
  var checkboxes = document.querySelectorAll('#geListaEstagiarios .ge-checkbox:checked');
  var ids = Array.prototype.map.call(checkboxes, function(cb) { return cb.value; });

  if (ids.length === 0) {
    mostrarToast('Marque ao menos um estagiário para finalizar.', 'alerta');
    return;
  }

  var btnSalvar = document.getElementById('btnSalvarGerenciarEstagiarios');
  btnSalvar.disabled = true;
  btnSalvar.innerHTML = 'Salvando...';

  google.script.run
    .withSuccessHandler(function(res) {
      btnSalvar.disabled = false;
      btnSalvar.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px;vertical-align:-3px;margin-right:4px;">save</span> Salvar';

      if (!res || !res.sucesso) {
        mostrarToast((res && res.erro) || 'Erro ao finalizar estagiários.', 'erro');
        return;
      }

      if (res.avisoGeral) {
        mostrarToast((res.mensagem || 'Estagiários finalizados.') + ' Porém houve falha ao sincronizar com a planilha GERAL: ' + res.avisoGeral, 'alerta');
      } else {
        mostrarToast(res.mensagem || 'Estagiários finalizados com sucesso!', 'sucesso');
      }
      fecharModalGerenciarEstagiarios();

      // Atualiza a lista global de estagiarios (usada nos selects de Novo
      // Pedido, Novo Acompanhamento e editar Diligência) para que os
      // finalizados deixem de aparecer imediatamente, sem precisar recarregar
      // a pagina inteira.
      google.script.run
        .withSuccessHandler(function(dados) {
          if (dados && dados.estagiarios) APP.dados.estagiarios = dados.estagiarios;
        })
        .recarregarListaEstagiarios();
    })
    .withFailureHandler(function(err) {
      btnSalvar.disabled = false;
      btnSalvar.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px;vertical-align:-3px;margin-right:4px;">save</span> Salvar';
      mostrarToast('Erro: ' + err.message, 'erro');
    })
    .acaoFinalizarEstagiarios(ids);
}

function abrirModalResultado(titulo, stats, avisos) {
  document.getElementById('mrTitulo').textContent = titulo;

  var statsEl = document.getElementById('mrStats');
  statsEl.innerHTML = '';
  stats.forEach(function(s) {
    var div = document.createElement('div');
    div.className = 'modal-resultado-stat';
    div.innerHTML =
      '<div class="modal-resultado-stat-valor">' + (s.valor || 0) + '</div>' +
      '<div class="modal-resultado-stat-label">' + s.label + '</div>';
    statsEl.appendChild(div);
  });

  var blocoAvisos = document.getElementById('mrAvisos');
  var listaAvisos = document.getElementById('mrListaAvisos');
  listaAvisos.innerHTML = '';
  if (avisos && avisos.length > 0) {
    avisos.forEach(function(a) {
      var li = document.createElement('li');
      li.textContent = a;
      listaAvisos.appendChild(li);
    });
    blocoAvisos.style.display = '';
  } else {
    blocoAvisos.style.display = 'none';
  }

  document.getElementById('modalResultadoOverlay').classList.add('visivel');
}

function fecharModalResultado() {

var _audienciasCarregado = false;

function carregarAbaAudiencias() {

// Semana = sabado a sexta (decisao de Thales). Se hoje for sabado, o
// "inicio" e o proprio hoje — nao o sabado anterior — entao a vista padrao
// (hoje até o fim da semana) mostra a semana que comeca hoje, nao a que
// acabou de terminar.
function calcularLimitesSemanaAudiencias() {
  var hoje = new Date();
  hoje.setHours(0, 0, 0, 0);
  var diasDesdeSabado = (hoje.getDay() - 6 + 7) % 7; // 0=dom...6=sab
  var inicioSemana = new Date(hoje);
  inicioSemana.setDate(hoje.getDate() - diasDesdeSabado);
  var fimSemana = new Date(inicioSemana);
  fimSemana.setDate(inicioSemana.getDate() + 6);
  return { hoje: hoje.getTime(), fimSemana: fimSemana.getTime() };
}

function classificarAudiencia(reg, hojeTs) {
  var ts = converterDataBRParaTimestamp(reg.data);
  if (ts === null) return 'semana';
  if (ts < hojeTs) return 'passada';
  if (ts === hojeTs) return 'hoje';
  return 'semana';
}

function corStatusAudiencia(status) {
  if (status === 'passada') return 'var(--cinza-texto)';
  if (status === 'hoje') return 'var(--cor-atraso)';
  return 'var(--cor-encaminhado)';
}

function getAudienciasFiltradas() {
  var lista = APP.dados.audiencias || [];
  var limites = calcularLimitesSemanaAudiencias();

  if (!APP_AUDIENCIAS.mostrarPassadas) {
    lista = lista.filter(function(r) {
      var ts = converterDataBRParaTimestamp(r.data);
      return ts !== null && ts >= limites.hoje && ts <= limites.fimSemana;
    });
  }

  if (APP_AUDIENCIAS.busca) {
    var b = normalizar(APP_AUDIENCIAS.busca);
    lista = lista.filter(function(r) {
      return normalizar(r.vara).includes(b) ||
        normalizar(r.assistido).includes(b) ||
        normalizar(r.processo).includes(b);
    });
  }

  // Passadas em DESC (mais recente primeiro), vindouras em ASC (mais próxima primeiro)
  var hojeTs = calcularLimitesSemanaAudiencias().hoje;
  var passadas = lista.filter(function(r) {
    var ts = converterDataBRParaTimestamp(r.data);
    return ts !== null && ts < hojeTs;
  });
  var vindouras = lista.filter(function(r) {
    var ts = converterDataBRParaTimestamp(r.data);
    return ts === null || ts >= hojeTs;
  });
  passadas.reverse();
  return vindouras.concat(passadas);
}

var MESES_ABREV_AUDIENCIAS = ['JAN', 'FEV', 'MAR', 'ABR', 'MAI', 'JUN', 'JUL', 'AGO', 'SET', 'OUT', 'NOV', 'DEZ'];

function renderizarCabecalhoDataAudiencia(reg, limites) {
  var partes = String(reg.data || '').split('/');
  var diaNum = partes[0] || '—';
  var mesAbrev = partes[1] ? (MESES_ABREV_AUDIENCIAS[parseInt(partes[1], 10) - 1] || '') : '';
  var cor = corStatusAudiencia(classificarAudiencia(reg, limites.hoje));
  var extenso = mesAbrev + (reg.dia ? ', ' + reg.dia : '');

  return '<tr class="audiencias-data-header">' +
    '<td colspan="4">' +
      '<div class="audiencias-data-linha">' +
        '<span class="audiencias-data-dot" style="background:' + cor + '"></span>' +
        '<span class="audiencias-data-numero">' + diaNum + '</span>' +
        '<span class="audiencias-data-extenso">' + extenso + '</span>' +
      '</div>' +
    '</td>' +
  '</tr>';
}

function renderizarCelulaProcessoAudiencia(reg, idx) {
  if (!reg.processo) return '<span class="celula-vazio">—</span>';
  return '<span class="audiencias-processo-cell">' +
    '<span>' + reg.processo + '</span>' +
    '<span class="material-symbols-outlined modal-copiar-icone" onclick="copiarProcessoAudienciaLinha(event, ' + idx + ')" title="Copiar processo" role="button" tabindex="0">content_copy</span>' +
  '</span>';
}

function renderizarTabelaAudiencias() {
  var lista = getAudienciasFiltradas();
  var limites = calcularLimitesSemanaAudiencias();

  document.getElementById('tabelaInfoAudiencias').innerHTML =
    '<strong>' + lista.length + '</strong> audiência(s) — ' +
    (APP_AUDIENCIAS.mostrarPassadas ? 'todas' : 'semana vindoura');

  var corpo = document.getElementById('audienciasCorpo');

  if (lista.length === 0) {
    corpo.innerHTML = celulaVaziaTabela(4, 'Nenhuma audiência encontrada');
    return;
  }

  var html = '';
  var dataAnterior = null;
  lista.forEach(function(reg, idx) {
    if (reg.data !== dataAnterior) {
      dataAnterior = reg.data;
      html += renderizarCabecalhoDataAudiencia(reg, limites);
    }
    html +=
      '<tr onclick="abrirModalAudiencia(' + idx + ')">' +
        '<td>' + (reg.hora || '<span class="celula-vazio">—</span>') + '</td>' +
        '<td>' + (reg.vara || '<span class="celula-vazio">—</span>') + '</td>' +
        '<td class="td-assistido">' + (reg.assistido || '<span class="celula-vazio">—</span>') + '</td>' +
        '<td class="td-processo">' + renderizarCelulaProcessoAudiencia(reg, idx) + '</td>' +
      '</tr>';
  });
  corpo.innerHTML = html;
}

function copiarProcessoAudienciaLinha(evt, idx) {
  evt.stopPropagation();
  var lista = getAudienciasFiltradas();
  var reg = lista[idx];
  copiarProcessoAudienciaValor(reg ? reg.processo : '');
}

function copiarProcessoAudiencia() {
  copiarProcessoAudienciaValor(APP_AUDIENCIAS.registroAtual ? APP_AUDIENCIAS.registroAtual.processo : '');
}

function copiarProcessoAudienciaValor(processo) {
  processo = String(processo || '');
  if (!processo) return;

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(processo).then(function() {
      mostrarToast('Processo copiado!', 'sucesso');
    }, function() { copiarProcessoFallback(processo); });
  } else {
    copiarProcessoFallback(processo);
  }
}

var btnCopiarProcessoAudiencia = document.getElementById('btnCopiarProcessoAudiencia');
if (btnCopiarProcessoAudiencia) {
  btnCopiarProcessoAudiencia.addEventListener('click', function(e) { e.stopPropagation(); copiarProcessoAudiencia(); });
  btnCopiarProcessoAudiencia.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); copiarProcessoAudiencia(); }
  });
}

// Card "Publicar Pauta da Semana" (aba Utilitarios > Classroom) — publica no
// mural do Classroom a pauta de segunda a sexta da semana corrente (ver

// de segunda-feira as 8h. Reune as audiencias de TODOS os registros da

  var card = document.getElementById('cardPublicarPautaSemana');

  card.classList.add('carregando');

    .withSuccessHandler(function(res) {

      if (!res.sucesso) {

      mostrarToast(msg, 'sucesso');

    .withFailureHandler(function(err) {
      card.classList.remove('carregando');
      labelEl.textContent = labelOriginal;
      mostrarToast('Erro ao publicar a pauta da semana: ' + err.message, 'erro');
    })
    .acaoPublicarPautaSemanal();

// === MODAL: FIA (Ficha Individual de Avaliacao) ===
// Calculadora pura no cliente. Nada e salvo em nenhuma planilha.
var FIA_ESTADO = { estrutura: null, faixas: null, notaMinima: 7 };

function abrirModalFIA() {
  fecharMenuGerenciar();

  document.getElementById('fiaCorpo').innerHTML = '<div class="ge-vazio" id="fiaCarregando">Carregando estrutura da FIA...</div>';

    .withSuccessHandler(function(res) {
      FIA_ESTADO.estrutura = res.estrutura;
      FIA_ESTADO.faixas = res.faixas;
      FIA_ESTADO.notaMinima = res.notaMinimaAprovacao;
      renderizarFIA();
    })
    .withFailureHandler(function(err) {

function fecharModalFIA() {
  document.getElementById('modalFIAOverlay').classList.remove('visivel');

document.getElementById('modalFIAOverlay').addEventListener('click', function(e) {

function renderizarFIA() {
  var estrutura = FIA_ESTADO.estrutura;
  var faixas = FIA_ESTADO.faixas;
  var html = '';

  estrutura.blocos.forEach(function(bloco) {
    var pesoBloco = bloco.indicadores.reduce(function(soma, ind) { return soma + ind.peso; }, 0);

    html += '<div class="fia-bloco" data-bloco="' + bloco.id + '">';
    html += '  <div class="fia-bloco-header">';
    html += '    <div class="fia-bloco-titulo">' + bloco.id + ') ' + bloco.nome +
            '      <span class="fia-bloco-peso">peso ' + pesoBloco + '</span></div>';
    html += '    <div class="fia-classificacao">';
    ['baixa', 'media', 'alta'].forEach(function(nivel) {
      var faixa = faixas[nivel];
      var rotulo = nivel.charAt(0).toUpperCase() + nivel.slice(1);
      html += '      <button type="button" class="fia-class-btn" data-bloco="' + bloco.id + '" data-nivel="' + nivel + '" ' +
              'onclick="classificarBlocoFIA(\'' + bloco.id + '\',\'' + nivel + '\')" ' +
              'title="Preenche automaticamente com ' + faixa.padrao + ' (faixa ' + faixa.min + '-' + faixa.max + ')">' +
              rotulo + '</button>';
    });
    html += '    </div>';
    html += '  </div>';

    html += '  <table class="fia-tabela"><thead><tr><th>Indicador</th><th>Peso</th><th>Nota</th><th>Parcial</th></tr></thead><tbody>';
    bloco.indicadores.forEach(function(ind) {
      var alerta = ehIndicadorReprovacaoAutomatica(ind.id)
        ? ' <span class="material-symbols-outlined fia-icone-alerta" title="Reprovação automática se a nota for menor que 7">error</span>'
        : '';
      html += '<tr data-indicador="' + ind.id + '">';
      html += '  <td class="fia-td-nome">' + ind.nome + alerta + '</td>';
      html += '  <td class="fia-td-peso">' + ind.peso + '</td>';
      html += '  <td class="fia-td-nota"><input type="number" class="fia-input-nota" id="fiaNota_' + ind.id + '" ' +
              'min="0" max="10" step="0.1" placeholder="0-10" oninput="recalcularFIA()"></td>';
      html += '  <td class="fia-td-parcial" id="fiaParcial_' + ind.id + '">—</td>';
      html += '</tr>';
    });
    html += '  </tbody><tfoot><tr>';
    html += '    <td colspan="3" class="fia-td-subtotal-label">Total Parcial</td>';
    html += '    <td class="fia-td-subtotal" id="fiaSubtotal_' + bloco.id + '">—</td>';
    html += '  </tr></tfoot></table>';
    html += '</div>';
  });

  html += '<div class="fia-alerta-reprovacao" id="fiaAlertaReprovacao" style="display:none;">' +
          '<span class="material-symbols-outlined" style="font-size:18px;">warning</span>' +
          'Reprovação automática: nota do indicador de Ética e/ou Produtividade abaixo de 7.</div>';

  document.getElementById('fiaCorpo').innerHTML = html;
  document.getElementById('fiaRodape').style.display = 'flex';
  recalcularFIA();
}

function ehIndicadorReprovacaoAutomatica(indicadorId) {
  return FIA_ESTADO.estrutura.reprovacaoAutomatica.some(function(regra) {
    return regra.indicadorId === indicadorId;
  });
}

function classificarBlocoFIA(blocoId, nivel) {
  var faixa = FIA_ESTADO.faixas[nivel];
  var bloco = FIA_ESTADO.estrutura.blocos.filter(function(b) { return b.id === blocoId; })[0];
  if (!bloco) return;

  bloco.indicadores.forEach(function(ind) {
    document.getElementById('fiaNota_' + ind.id).value = faixa.padrao;
  });

  document.querySelectorAll('.fia-class-btn[data-bloco="' + blocoId + '"]').forEach(function(btn) {
    btn.classList.toggle('fia-class-btn-ativo', btn.getAttribute('data-nivel') === nivel);
  });

  recalcularFIA();
}

// Arredondamento da NOTA FINAL (unico ponto de arredondamento de toda a FIA):
//   fracao entre 0.01 e 0.40  -> arredonda para baixo
//   fracao entre 0.41 e 0.64  -> arredonda para 0.5
//   fracao entre 0.65 e 0.99  -> arredonda para cima
function arredondarNotaFinalFIA(bruta) {
  var parteInteira = Math.floor(bruta + 1e-9);
  var fracao = Math.round((bruta - parteInteira) * 100) / 100;

  if (fracao <= 0.40) return parteInteira;
  if (fracao <= 0.64) return parteInteira + 0.5;
  return parteInteira + 1;
}

function recalcularFIA() {
  var estrutura = FIA_ESTADO.estrutura;
  if (!estrutura) return;

  var totalGeral = 0;
  var algumaNotaPreenchida = false;
  var reprovacaoAutomatica = false;

  estrutura.blocos.forEach(function(bloco) {
    var subtotalBloco = 0;

    bloco.indicadores.forEach(function(ind) {
      var input = document.getElementById('fiaNota_' + ind.id);
      var parcialEl = document.getElementById('fiaParcial_' + ind.id);
      var valor = parseFloat(input.value);

      if (isNaN(valor)) {
        parcialEl.textContent = '—';
        return;
      }

      valor = Math.max(0, Math.min(10, valor));
      algumaNotaPreenchida = true;

      var parcial = valor * ind.peso;
      subtotalBloco += parcial;
      totalGeral += parcial;
      parcialEl.textContent = parcial.toFixed(1);

      if (ehIndicadorReprovacaoAutomatica(ind.id) && valor < 7) {
        reprovacaoAutomatica = true;
      }
    });

    document.getElementById('fiaSubtotal_' + bloco.id).textContent = subtotalBloco.toFixed(1);
  });

  document.getElementById('fiaAlertaReprovacao').style.display = reprovacaoAutomatica ? 'flex' : 'none';

  var notaFinalEl = document.getElementById('fiaNotaFinal');
  var badgeEl = document.getElementById('fiaBadgeSituacao');

  if (!algumaNotaPreenchida) {
    notaFinalEl.textContent = '—';
    badgeEl.textContent = '—';
    badgeEl.className = 'fia-badge';
    return;
  }

  var notaBruta = totalGeral / 100;
  var notaFinal = arredondarNotaFinalFIA(notaBruta);
  notaFinalEl.textContent = notaFinal.toFixed(1).replace('.0', ',0').replace('.5', ',5');

  var aprovado = !reprovacaoAutomatica && notaFinal >= FIA_ESTADO.notaMinima;
  badgeEl.textContent = aprovado ? 'Aprovado' : 'Reprovado';
  badgeEl.className = 'fia-badge ' + (aprovado ? 'fia-badge-aprovado' : 'fia-badge-reprovado');
}

function executarCalcularDiaUtil() {
  var data = document.getElementById('cduData').value;
  var prazo = parseInt(document.getElementById('cduPrazo').value, 10);

  if (!data) {
    mostrarToast('Informe a data de início.', 'erro');
    return;
  }
  if (!prazo || prazo < 1) {
    mostrarToast('Informe um prazo em dias úteis (mínimo 1).', 'erro');
    return;
  }

  var btn = document.getElementById('btnCalcularDiaUtil');
  btn.disabled = true;
  btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px;">hourglass_top</span> Calculando...';

  google.script.run
    .withSuccessHandler(function(res) {
      btn.disabled = false;
      btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px;vertical-align:-3px;margin-right:4px;">calculate</span> Calcular';

      if (!res.sucesso) {
        mostrarToast(res.erro || 'Erro ao calcular.', 'erro');
        return;
      }

      document.getElementById('cduResultadoValor').textContent = res.dataFinal + ' (' + res.diaSemana + ')';
      document.getElementById('cduResultado').style.display = 'block';
    })
    .withFailureHandler(function(err) {
      btn.disabled = false;
      btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px;vertical-align:-3px;margin-right:4px;">calculate</span> Calcular';
      mostrarToast('Erro ao calcular: ' + err.message, 'erro');
    })
    .acaoCalcularDiaUtil(data, prazo);
}
